<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>🇺🇸 MWCGA — Make The World Cup Great Again 🇺🇸</title>

<!-- Home-screen web app (iOS Safari + Android/Chrome). Add via Safari → Share →
     Add to Home Screen for a full-screen, app-like launch with a custom icon. -->
<link rel="manifest" href="manifest.webmanifest">
<meta name="theme-color" content="#0a1c4a">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="MWCGA">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
<style>
  :root {
    --bg: #0a1c4a;
    --panel: #112a6b;
    --panel-2: #1a3a8a;
    --border: #2b50b0;
    --text: #ffffff;
    --muted: #b8c8f0;
    --accent: #ffd700;
    --accent-2: #b22234;
    --green: #06d6a0;
    --red: #b22234;
    --blue: #3c3b6e;
    --p1: #e63946;
    --p2: #ffffff;
    --p3: #ffd700;
    --p4: #4a90e2;
    --spoiler: #6c757d;
    --stripe-red: #b22234;
    --stripe-white: #ffffff;
  }

  @keyframes wave-stripes {
    from { background-position: 0 0; }
    to   { background-position: 60px 0; }
  }
  @keyframes star-twinkle {
    0%,100% { opacity: 0.25; transform: scale(1); }
    50%     { opacity: 0.9;  transform: scale(1.2); }
  }
  @keyframes patriot-glow {
    0%,100% { box-shadow: 0 0 20px rgba(255,215,0,0.3), 0 0 40px rgba(178,34,52,0.2); }
    50%     { box-shadow: 0 0 30px rgba(255,215,0,0.6), 0 0 60px rgba(178,34,52,0.4); }
  }
  @keyframes slideIn {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0); opacity: 1; }
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: #0a1c4a;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 15px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── FLAG STRIPES ── */
  .flag-stripes {
    height: 6px;
    background: repeating-linear-gradient(
      90deg,
      var(--stripe-red) 0 30px,
      var(--stripe-white) 30px 60px
    );
    animation: wave-stripes 4s linear infinite;
  }

  /* ── HEADER ── */
  header {
    background: var(--panel);
    padding: 12px 16px;
    border-bottom: 3px solid var(--accent);
  }
  h1 {
    margin: 0 0 4px;
    font-size: 17px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    line-height: 1.2;
    text-shadow: 0 0 10px rgba(255,215,0,0.3);
  }
  h1 .accent { color: var(--accent); }
  h1 .red    { color: var(--accent-2); }
  h1 .star {
    display: inline-block;
    color: var(--accent);
    animation: star-twinkle 2s ease-in-out infinite;
  }
  h1 .star:nth-child(2) { animation-delay: 0.5s; }
  h1 .star:nth-child(3) { animation-delay: 1.0s; }
  .subtitle {
    color: var(--accent);
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    margin-bottom: 8px;
  }
  .scoreboard {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }
  .score-pill {
    background: var(--panel-2);
    border: 1.5px solid var(--accent);
    padding: 5px 10px;
    border-radius: 999px;
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 13px;
    font-weight: 700;
  }
  .score-pill .dot { width: 10px; height: 10px; border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.4); }
  .score-pill .pts { color: var(--accent); font-weight: 900; }

  /* ── TAB NAVIGATION — normal document flow, zero positioning ── */
  .tab-nav {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    padding: 12px;
    background: #112a6b;
    border-bottom: 1px solid var(--border);
  }
  .tab {
    display: inline-block;
    padding: 14px 18px;
    font-size: 15px;
    font-weight: 600;
    background: transparent;
    border: none;
    border-bottom: 3px solid transparent;
    color: var(--muted);
    cursor: pointer;
    border-radius: 6px 6px 0 0;
    white-space: nowrap;
    line-height: 1.2;
    transition: color 0.15s, border-color 0.15s;
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }
  .tab:hover { color: var(--text); }
  .tab.active {
    color: #ffffff;
    border-bottom-color: var(--accent);
  }

  /* ── TAB CONTENT ── */
  .tab-content { padding: 16px; }

  /* ── MAIN WRAPPER ── */
  main { max-width: 680px; margin: 0 auto; }

  /* ── PANELS ── */
  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
  }
  .panel h2 {
    margin: 0 0 12px;
    font-size: 16px;
    color: var(--accent);
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .panel .sub {
    color: var(--muted);
    font-size: 14px;
    margin-bottom: 12px;
    line-height: 1.5;
  }

  /* ── BUTTONS ── */
  button {
    background: var(--accent);
    color: #0a1c4a;
    border: none;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 700;
    cursor: pointer;
    font-size: 15px;
    min-height: 44px;
    transition: filter 0.15s;
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }
  button:hover  { filter: brightness(1.1); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }
  button.ghost {
    background: transparent;
    color: var(--accent);
    border: 2px solid var(--accent);
  }
  button.ghost:hover { background: rgba(255,215,0,0.1); }
  button.danger {
    background: #6c757d;
    color: white;
  }

  /* ── INPUTS ── */
  input[type=text], input[type=number] {
    background: var(--panel-2);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 12px;
    border-radius: 8px;
    font-size: 16px;   /* prevents iOS zoom */
    width: 100%;
    min-height: 44px;
  }
  input:focus { outline: 2px solid var(--accent); }
  label { display: block; font-size: 13px; color: var(--muted); margin-bottom: 4px; }

  select {
    background: var(--panel-2);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 10px;
    border-radius: 6px;
    font-size: 15px;
    min-height: 44px;
  }

  input[type=number].score-input {
    width: 64px;
    text-align: center;
    font-size: 20px;
    font-weight: 800;
    min-height: 52px;
    padding: 8px 4px;
  }

  /* ── GRIDS ── */
  .grid   { display: grid; gap: 12px; }
  .grid-2 { grid-template-columns: 1fr 1fr; }
  .grid-3 { grid-template-columns: 1fr; }   /* single-column on mobile */
  .grid-4 { grid-template-columns: 1fr 1fr; }
  @media (max-width: 400px) {
    .grid-2, .grid-4 { grid-template-columns: 1fr; }
  }

  /* ── HELPERS ── */
  .row    { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
  .spacer { flex: 1; min-width: 0; }
  .small  { font-size: 12px; color: var(--muted); }
  .empty  { color: var(--muted); padding: 24px; text-align: center; font-size: 14px; }

  .badge     { padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; background: var(--panel-2); border: 1px solid var(--border); }
  .badge.ko  { background: var(--accent); color: #1a1a1a; border-color: var(--accent); }

  /* ── OWNER BORDERS ── */
  .owned-p1 { border-left: 4px solid var(--p1); }
  .owned-p2 { border-left: 4px solid var(--p2); }
  .owned-p3 { border-left: 4px solid var(--p3); }
  .owned-p4 { border-left: 4px solid var(--p4); }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 16px; left: 10px; right: 10px;
    text-align: center;
    background: var(--accent);
    color: #1a1a1a;
    padding: 14px 20px;
    border-radius: 10px;
    font-weight: 800;
    font-size: 14px;
    z-index: 200;
    box-shadow: 0 8px 24px rgba(0,0,0,0.5);
    animation: slideIn 0.3s;
  }
  .toast.error { background: var(--accent-2); color: white; }

  /* ── TODAY BANNER ── */
  .today-banner {
    background: var(--panel-2);
    border: 2px solid var(--accent);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 14px;
    text-align: center;
  }
  .today-banner h2 {
    color: var(--accent);
    margin: 0 0 6px;
    font-size: 16px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    text-shadow: 0 0 10px rgba(255,215,0,0.3);
  }
  .who-roots { display: flex; justify-content: center; gap: 8px; flex-wrap: wrap; margin-top: 8px; }
  .root-card { padding: 6px 12px; border-radius: 8px; font-weight: 700; font-size: 13px; color: #1a1a1a; }

  /* ── MATCH CARDS ── */
  .match-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .match-meta {
    display: flex;
    justify-content: space-between;
    color: var(--muted);
    font-size: 12px;
    margin-bottom: 8px;
    flex-wrap: wrap;
    gap: 4px;
  }
  .match-teams {
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    gap: 8px;
    align-items: center;
  }
  .match-team {
    display: flex;
    align-items: center;
    gap: 5px;
    font-weight: 600;
    font-size: 13px;
    flex-wrap: wrap;
  }
  .match-team.right { justify-content: flex-end; text-align: right; }
  .match-team .flag { font-size: 20px; }
  .score {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 5px 8px;
    font-weight: 800;
    font-size: 15px;
    min-width: 56px;
    text-align: center;
  }
  .score.live      { border-color: var(--green); color: var(--green); }
  .score.scheduled { color: var(--muted); }
  .match-extras { margin-top: 8px; display: flex; gap: 5px; flex-wrap: wrap; }
  .pts-pill {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    padding: 2px 8px;
    border-radius: 999px;
    font-weight: 700;
    font-size: 11px;
  }

  /* ── VEGAS DESK (draft-night odds strip on upcoming match cards) ── */
  .odds-strip {
    margin-top: 8px;
    padding: 7px 10px 8px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    font-size: 12px;
  }
  .odds-row { display: flex; justify-content: space-between; align-items: baseline; gap: 8px; padding: 1px 0; }
  .odds-row .odds-val { font-weight: 800; min-width: 84px; white-space: nowrap; }
  .odds-row .odds-val.right { text-align: right; }
  .odds-row .odds-label { color: var(--muted); font-size: 10px; font-weight: 700; letter-spacing: 0.8px; text-align: center; flex: 1; }
  .odds-bar { display: flex; height: 6px; border-radius: 999px; overflow: hidden; margin: 4px 0 3px; border: 1px solid var(--border); }
  .odds-bar .l { background: var(--accent); }
  .odds-bar .r { background: #4a90e2; flex: 1; }

  /* ── PICK-NOW BANNER ── */
  .pick-now {
    background: linear-gradient(135deg, var(--accent) 0%, #f5b942 50%, var(--accent-2) 150%);
    color: #1a1a1a;
    padding: 16px;
    border-radius: 12px;
    margin-bottom: 14px;
    font-weight: 900;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border: 3px solid var(--accent-2);
    animation: patriot-glow 2s ease-in-out infinite;
  }

  /* ── GROUP CARDS ── */
  .group-card {
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    margin-bottom: 10px;
  }
  .group-card.active { border-color: var(--accent); box-shadow: 0 0 0 1px var(--accent); }
  .group-name {
    font-weight: 700;
    font-size: 14px;
    color: var(--accent);
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }

  /* ── TEAM ROWS ── */
  .team-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 8px;
    border-radius: 8px;
    margin-bottom: 6px;
    background: var(--panel);
    border: 1px solid var(--border);
    font-size: 13px;
    min-height: 44px;
    flex-wrap: nowrap;
  }
  .team-row.drafted { opacity: 0.75; }
  .team-row.spoiler { border-style: dashed; border-color: var(--spoiler); opacity: 0.85; }
  .team-row .flag   { font-size: 18px; margin-right: 5px; flex-shrink: 0; }
  .team-row .name   { flex: 1; font-weight: 600; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .team-row .odds   { color: var(--muted); font-size: 11px; margin-right: 5px; font-weight: 700; flex-shrink: 0; }

  /* ── SEED BADGE ── */
  .seed-badge {
    display: inline-flex;
    align-items: center;
    padding: 2px 6px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    margin-right: 5px;
    min-width: 60px;
    justify-content: center;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .seed-badge .num {
    background: rgba(0,0,0,0.2);
    border-radius: 999px;
    padding: 0 3px;
    margin-right: 3px;
    font-size: 9px;
  }

  /* ── OWNER TAG & PICK BUTTON ── */
  .owner-tag {
    padding: 2px 7px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    color: #1a1a1a;
    flex-shrink: 0;
  }
  .pick-btn {
    padding: 8px 12px;
    font-size: 13px;
    border-radius: 6px;
    min-height: 40px;
    flex-shrink: 0;
  }

  /* ── TABLE ── */
  table { width: 100%; border-collapse: collapse; }
  th, td { text-align: left; padding: 9px 8px; border-bottom: 1px solid var(--border); font-size: 13px; }
  th { color: var(--muted); font-weight: 600; font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; }
  tr:hover td { background: var(--panel-2); }
  .rank-1 td:first-child { color: var(--accent); font-weight: 800; font-size: 16px; }

  /* ── MULTIPLIER BAR ── */
  .multiplier-bar { display: flex; gap: 4px; margin-top: 8px; }
  .multiplier-cell {
    flex: 1;
    text-align: center;
    padding: 6px 2px;
    background: var(--panel-2);
    border-radius: 6px;
    font-size: 9px;
    border: 1px solid var(--border);
  }
  .multiplier-cell .num { color: var(--accent); font-weight: 800; font-size: 12px; display: block; margin-bottom: 2px; }

  /* ── LEGEND ── */
  .legend {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-top: 12px;
  }
  .legend-item { background: var(--panel-2); padding: 10px 12px; border-radius: 8px; border: 1px solid var(--border); font-size: 13px; }
  .legend-item strong { color: var(--accent); display: block; margin-bottom: 2px; }

  /* ── ROSTER ── */
  .roster-grid { display: grid; grid-template-columns: 1fr; gap: 8px; }
  .roster-team {
    padding: 10px 12px;
    background: var(--panel-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 14px;
    min-height: 44px;
  }

  /* ── DETAILS/SUMMARY ── */
  details summary {
    cursor: pointer;
    font-weight: 700;
    padding: 8px 0;
    color: var(--accent);
    min-height: 44px;
    display: flex;
    align-items: center;
    -webkit-tap-highlight-color: transparent;
  }
  details summary:hover { opacity: 0.85; }

  /* ── STANDINGS OVERHAUL ── */
  .standings-cards {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 4px;
  }
  .standings-card {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 16px;
    transition: box-shadow 0.15s;
  }
  .standings-card:hover {
    box-shadow: 0 4px 16px rgba(0,0,0,0.3);
  }
  .standings-card-top {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 10px;
    flex-wrap: wrap;
  }
  .standings-rank {
    display: flex;
    align-items: center;
    gap: 4px;
    min-width: 56px;
    flex-shrink: 0;
  }
  .standings-rank-icon { font-size: 20px; line-height: 1; }
  .standings-rank-num {
    font-size: 15px;
    font-weight: 900;
    letter-spacing: -0.5px;
  }
  .standings-name-wrap {
    display: flex;
    align-items: center;
    gap: 8px;
    flex: 1;
    min-width: 0;
  }
  .standings-dot {
    width: 12px;
    height: 12px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.3);
    flex-shrink: 0;
    display: inline-block;
  }
  .standings-player-name {
    font-size: 17px;
    font-weight: 800;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .standings-pts-big {
    font-size: 26px;
    font-weight: 900;
    letter-spacing: -1px;
    flex-shrink: 0;
    text-align: right;
  }
  .standings-proj-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }
  .standings-rem-pill {
    padding: 3px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.3px;
    text-transform: uppercase;
  }
  .standings-projected {
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.3px;
  }
  .standings-alive-row {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 8px;
    font-size: 12px;
    font-weight: 700;
  }
  .standings-alive-tag { }
  .standings-elim-tag {
    color: var(--muted);
  }
  .standings-bar-wrap {
    height: 7px;
    background: rgba(255,255,255,0.08);
    border-radius: 999px;
    overflow: hidden;
    position: relative;
    margin-top: 2px;
  }
  .standings-bar-fill {
    height: 100%;
    border-radius: 999px;
    transition: width 0.4s ease;
    min-width: 3px;
  }
  .standings-bar-pct {
    display: block;
    font-size: 10px;
    font-weight: 700;
    text-align: right;
    margin-top: 2px;
    letter-spacing: 0.3px;
    text-transform: uppercase;
    opacity: 0.8;
  }

  /* Teams in Action */
  .standings-alive-section {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    margin-bottom: 8px;
  }
  .standings-section-header {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
  }
  .standings-team-row {
    padding: 8px 0;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    display: flex;
    flex-direction: column;
    gap: 3px;
  }
  .standings-team-row:last-child { border-bottom: none; }
  .standings-team-main {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .standings-team-name {
    flex: 1;
    font-weight: 600;
    font-size: 13px;
  }
  .standings-team-pts {
    font-weight: 800;
    font-size: 13px;
    flex-shrink: 0;
  }
  .standings-team-sub {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11px;
    padding-left: 28px;
    flex-wrap: wrap;
  }
  .standings-max-add {
    font-weight: 700;
  }
  .standings-next-match {
    color: var(--muted);
  }

  /* Eliminated section */
  .standings-elim-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 6px;
  }
  .standings-elim-chip {
    display: inline-flex;
    align-items: center;
    gap: 4px;

// Tournament-winner odds for ALL 48 teams, sourced from OddsChecker April 2026.

const TITLE_ODDS = {

// ── THE VEGAS DESK ──────────────────────────────────────────────────────────
// Display-only math on TITLE_ODDS. The odds themselves are LOCKED at their
// draft-night values — they never move with results; that's the whole point.

// Implied title chance from fractional odds: 80/1 → 1.23%.
function impliedTitlePct(team) {
  const f = TITLE_ODDS[team];
  if (!f) return null;
  const [a, b] = String(f).split('/').map(Number);
  return a && b ? 100 * b / (a + b) : null;
}

// Head-to-head win chance for one match, from the two teams' title chances.
// Square-root softening keeps mismatches believable (Spain vs Haiti ≈ 96/4,
// not 99.8/0.2). Draws aren't modeled — these are bragging-rights numbers.
function h2hPct(t1, t2) {
  const q1 = impliedTitlePct(t1), q2 = impliedTitlePct(t2);
  if (q1 == null || q2 == null) return null;
  const a = Math.sqrt(q1), b = Math.sqrt(q2);
  return 100 * a / (a + b);
}

// American money line from a win percentage, rounded to 5 like the books.
function moneyline(pct) {
  const p = pct / 100;
  const raw = p >= 0.5 ? -100 * p / (1 - p) : 100 * (1 - p) / p;
  const ml = Math.round(raw / 5) * 5;
  return (ml > 0 ? '+' : '') + ml;
}

// Nearest classic bookmaker fraction for a win percentage: 33% → "2/1".
const BOOK_FRACTIONS = ['1/20','1/12','1/8','1/6','1/5','1/4','2/7','1/3','2/5','4/9','1/2','8/15','4/7','8/13','4/6','8/11','4/5','10/11','1/1','11/10','6/5','5/4','11/8','6/4','13/8','7/4','15/8','2/1','9/4','5/2','11/4','3/1','10/3','7/2','4/1','9/2','5/1','11/2','6/1','7/1','8/1','9/1','10/1','12/1','14/1','16/1','20/1'];
function bookFraction(pct) {
  const dec = (100 - pct) / pct;
  let best = BOOK_FRACTIONS[0], bd = Infinity;
  for (const f of BOOK_FRACTIONS) {
    const [a, b] = f.split('/').map(Number);
    const d = Math.abs(Math.log((a / b) / dec));
    if (d < bd) { bd = d; best = f; }
  }
  return best;
}

// Kid-readable title chance: 9/2 → "18%", 80/1 → "1.2%", 3000/1 → "0.03%".
function titlePctLabel(team) {
  const q = impliedTitlePct(team);
  if (q == null) return null;
  return (q >= 10 ? q.toFixed(0) : q >= 0.095 ? q.toFixed(1) : q.toFixed(2)) + '%';
}

// The same chance as a "1 in N shot" for tooltips: 80/1 → "1 in 81".
function oneInN(team) {
  const f = TITLE_ODDS[team];
  if (!f) return null;
  const [a, b] = String(f).split('/').map(Number);
  if (!a || !b) return null;
  const n = (a + b) / b;
  return '1 in ' + (n >= 10 ? Math.round(n) : n.toFixed(1).replace(/\.0$/, ''));
}

function loadState() {

    const parsed = JSON.parse(raw);
    return { ...JSON.parse(JSON.stringify(DEFAULT_STATE)), ...parsed };
  } catch (e) {
    console.error('loadState error', e);
    return JSON.parse(JSON.stringify(DEFAULT_STATE));
  }
}
let _storageWarned = false;
function saveState(opts = {}) {
  try {
    localStorage.setItem(STATE_KEY, JSON.stringify(state));

    if (!_storageWarned) {
      _storageWarned = true;

    }
  }

  if (!opts.skipCloudPush) debouncedCloudPush();

// 3.  MATCH KEY / ROUND PARSER
// ============================================================================
// Display helper: convert "HH:MM UTC±X" stadium-local kickoff times to US
// Central time (CDT = UTC-5 across the whole Jun-Jul 2026 tournament window).
function centralTime(timeStr) {
  if (!timeStr) return '';
  const m = String(timeStr).match(/^(\d{1,2}):(\d{2})\s*UTC([+-]\d+)$/);
  if (!m) return timeStr;
  let total = (parseInt(m[1], 10) + (-5 - parseInt(m[3], 10))) * 60 + parseInt(m[2], 10);
  let dayNote = '';
  if (total < 0) { total += 1440; dayNote = ' (prev. day)'; }
  if (total >= 1440) { total -= 1440; dayNote = ' (next day)'; }
  const hh = Math.floor(total / 60), mm = total % 60;
  const h12 = hh % 12 === 0 ? 12 : hh % 12;
  return `${h12}:${String(mm).padStart(2, '0')} ${hh >= 12 ? 'PM' : 'AM'} CT${dayNote}`;
}

// Local calendar date as YYYY-MM-DD. new Date().toISOString() is UTC, which
// flips to "tomorrow" at 7 PM Central — wrong for "today's games" and gates.
function localDateStr(d = new Date()) {
  return d.getFullYear() + '-' + String(d.getMonth() + 1).padStart(2, '0') + '-' + String(d.getDate()).padStart(2, '0');
}

function matchKey(m) {
  // Stable identifier for a match
  if (m.num) return 'k' + m.num;
  return [m.date, m.team1, m.team2].join('|');
}

function roundOf(m) {
  const r = (m.round || '').toLowerCase();
  if (r.startsWith('matchday')) return 'group';
  if (r.includes('round of 32')) return 'r32';
  if (r.includes('round of 16')) return 'r16';
  if (r.includes('quarter')) return 'qf';
  if (r.includes('semi')) return 'sf';
  if (r.includes('third')) return 'third';
  if (r === 'final') return 'final';
  return 'group';
}

function mapTeamName(name) {
  if (!name) return name;
  if (PLAYOFF_MAP[name]) return PLAYOFF_MAP[name];
  // Knockout placeholders like "1A", "W74", "3A/B/C/D/F" — keep as-is, resolved later.
  return name;
}

/**
 * Build the draft pick order. Each of 12 groups gets 4 picks (one per player),
 * so all 48 teams are drafted — no spoilers. Pick-order within each group
 * rotates via a 4×4 Latin square repeated 3 times: each player picks at each
 * position (1st, 2nd, 3rd, 4th) exactly 3 times across the 12 groups.
 *
 * Returns array of { group, pickIndex, playerIdx } in pick order — length 48.
 */
function buildPickOrder(playerCount = 4) {
  const order = [];
  // Three orthogonal 4×4 Latin squares stacked, giving 12 groups with balance
  const baseOrders = [
    [0,1,2,3], [1,0,3,2], [2,3,0,1], [3,2,1,0],
    [0,2,3,1], [1,3,2,0], [2,0,1,3], [3,1,0,2],
    [0,3,1,2], [1,2,0,3], [2,1,3,0], [3,0,2,1],
  ];
  GROUPS.forEach((g, gi) => {
    const ordering = baseOrders[gi % baseOrders.length];
    ordering.forEach((p, i) => {
      order.push({ group: g, pickIndex: i, playerIdx: p });
    });
  });
  return order;
}

function teamsInGroup(g) {
  return Object.keys(TEAMS)
    .filter(t => TEAMS[t].group === g)
    .sort((a,b) => TEAMS[a].seed - TEAMS[b].seed);
}

function draftedTeams() {
  return Object.values(state.rosters).flat();
}

// ── DEVICE SEATS ──────────────────────────────────────────────────────────
// Which players pick from THIS device (kept local, never synced). At Mom's
// house one shared device can claim two seats. No seats claimed = open device.
const SEATS_KEY = 'wc2026_device_seats_v1';
function deviceSeats() {
  try { return JSON.parse(localStorage.getItem(SEATS_KEY)) || []; }
  catch (e) { return []; }
}
function toggleSeat(i) {
  const s = deviceSeats();
  const ix = s.indexOf(i);
  if (ix >= 0) s.splice(ix, 1); else s.push(i);
  try { localStorage.setItem(SEATS_KEY, JSON.stringify(s)); }
  catch (e) { toast('Could not save the seat claim on this device.', true); }
  renderAll();
}
function deviceMayPick(playerIdx) {
  const s = deviceSeats();
  return s.length === 0 || s.includes(playerIdx);
}

function currentPick() {
  if (state.draftComplete) return null;
  const order = buildPickOrder();
  return order[state.draftPickIdx];
}

async function pickTeam(teamName) {
  if (_pickBusy) return; // double-tap guard
  _pickBusy = true;
  try {
    // Confirm before committing — a pick is permanent and propagates to every
    // household within seconds, and two of the drafters are kids.
    const intended = currentPick();
    if (!intended) return;
    const who = state.players[intended.playerIdx];
    if (!confirm(`Draft ${teamName} for ${who ? who.name : 'this player'}?`)) return;
    // LIVE-DRAFT SAFETY: re-sync with the cloud before committing, so a stale
    // device can't overwrite someone else's pick. Fails CLOSED: if a fresh
    // read of the cloud isn't possible right now, the pick is not committed.
    if (cloudConfigured()) {
      const before = state.draftPickIdx;
      const ok = await pullFromCloud({ force: true, quiet: true });
      if (!ok) {
        if (_pushFailed && !_pushInFlight) {
          // Earlier data from this device is still unsynced — a fresh tap is a
          // better retry trigger than the backoff clock. Land it now.
          if (_pushRetryTimer) { clearTimeout(_pushRetryTimer); _pushRetryTimer = null; }
          pushToCloud();
        }
        toast(_lastPullInvalid
          ? 'The cloud game data looks corrupted — picks are paused. Tell the commissioner (a backup restore fixes this).'
          : 'Could not verify with the cloud — check your connection and tap the pick again.', true);
        return;
      }
      if (state.draftPickIdx !== before) {
        toast('Draft updated from another house — board refreshed. Check whose turn it is!', true);
        renderAll();
        return;
      }
    }
    const pick = currentPick();
    if (!pick) return;
    const team = TEAMS[teamName];
    if (!team || team.group !== pick.group) {
      toast('That team is not in the current draft group.', true);
      return;
    }
    if (draftedTeams().includes(teamName)) {
      toast('Already drafted.', true);
      return;
    }
    if (!state.rosters[pick.playerIdx]) state.rosters[pick.playerIdx] = [];
    state.rosters[pick.playerIdx].push(teamName);
    state.draftPickIdx++;
    // With 4 players × 12 groups, every team gets drafted — no spoilers.
    if (state.draftPickIdx >= 48) {
      finalizeDraft();
    }
    saveState({ skipCloudPush: true });
    renderAll();
    // Push the pick to the family IMMEDIATELY (no debounce), retry once.
    if (cloudConfigured()) {
      let okPush = await pushToCloud();
      if (!okPush) okPush = await pushToCloud();
      if (!okPush) {
        toast('Pick saved on this device but not synced yet — will keep retrying.', true);
        debouncedCloudPush();
      }
    }
  } finally {
    _pickBusy = false;
  }
}

function finalizeDraft() {
  // Sweep up any remaining undrafted teams as spoilers
  const drafted = draftedTeams();
  Object.keys(TEAMS).forEach(t => {
    if (!drafted.includes(t) && !state.spoilers.includes(t)) state.spoilers.push(t);
  });
  state.draftComplete = true;
  saveState();
  toast('🏆 DRAFT COMPLETE! USA! USA! USA! May the best patriot win! 🇺🇸');
}

function ownerOfTeam(team) {
  for (let i = 0; i < (state.players?.length || 0); i++) {
    if ((state.rosters[i] || []).includes(team)) return i;
  }
  return -1;
}

// ── CIVIL WAR BOUNTY (house rule 2026-06-17) ────────────────────────────────
// A KNOCKOUT match between two teams owned by the SAME player. The owner is
// guaranteed to advance one of them, so normal scoring is moot — it's REPLACED
// by a side-bet: the owner predicts which of their two teams wins. Returns false
// for group games and until BOTH knockout slots resolve to real owned teams
// (placeholders like "W74" aren't owned), which is correct — you only know it's
// a civil war once both teams are real.
function isCivilWar(m) {
  if (roundOf(m) === 'group') return false;
  const o1 = ownerOfTeam(mapTeamName(m.team1));
  return o1 >= 0 && o1 === ownerOfTeam(mapTeamName(m.team2));
}

// The owner's predicted winner for a civil-war match: their saved pick if it's
// one of the two teams, else DEFAULT-TO-FAVORITE by locked draft-night title
// odds (higher implied chance), so a forgetful owner isn't punished. Tie / no
// odds → team1. Generic enough to share with the Crystal Ball Cup (Task G).
function bountyPick(m) {
  const t1 = mapTeamName(m.team1), t2 = mapTeamName(m.team2);
  const saved = state.bounties && state.bounties[matchKey(m)];
  if (saved === t1 || saved === t2) return saved;
  const q1 = impliedTitlePct(t1) ?? -1, q2 = impliedTitlePct(t2) ?? -1;
  return q2 > q1 ? t2 : t1;
}

// ── 🔮 CRYSTAL BALL CUP (side-game, Task G) ─────────────────────────────────
// A bragging-rights prediction game that rides ALONGSIDE the league but NEVER
// touches the sacred fantasy scoring: every family member taps their predicted
// winner for each match BEFORE kickoff; a separate leaderboard counts hits.
// Picks live in state.predictions (keyed matchKey → { playerIdx: pick }) and
// sync through Firebase exactly like state.bounties. Correct pick pays by round
// (group +1 … Final +13) so late-round calls matter — bragging rights only.
// Nothing here is imported by scoreMatch/matchPoints/totalPoints.

// The actual winning team NAME of a finished match, or 'DRAW', or null if the
// result isn't decided yet (no score, or a level KO before its shootout). Uses
// the same winner logic as scoreMatch (regulation, then penalty shootout).
function matchOutcome(m) {
  if (!hasResult(m)) return null;
  const t1 = mapTeamName(m.team1), t2 = mapTeamName(m.team2);
  const s1 = Math.max(0, Number(m.score1) || 0), s2 = Math.max(0, Number(m.score2) || 0);
  const ko = roundOf(m) !== 'group';
  if (s1 > s2) return t1;
  if (s2 > s1) return t2;
  if (ko && m.pens1 != null && m.pens2 != null && Number(m.pens1) !== Number(m.pens2)) {
    return Number(m.pens1) > Number(m.pens2) ? t1 : t2;
  }
  return 'DRAW'; // group draw (a valid pick) or a level KO awaiting pens (caller treats as undecided for KO)
}

// Absolute kickoff instant for a match (Date) from its 'YYYY-MM-DD' date + a
// 'HH:MM UTC±X' stadium-local time, or null if the time can't be parsed. Mirrors
// centralTime's offset convention (UTC = local − offset); Date.UTC normalises
// any hour overflow into the right calendar day.
function matchKickoff(m) {
  if (!m || !m.date) return null;
  const t = String(m.time || '').match(/^(\d{1,2}):(\d{2})\s*UTC([+-]\d+)$/);
  if (!t) return null;
  const [Y, Mo, D] = m.date.split('-').map(Number);
  if (!Y || !Mo || !D) return null;
  return new Date(Date.UTC(Y, Mo - 1, D, parseInt(t[1], 10) - parseInt(t[3], 10), parseInt(t[2], 10)));
}

// A Crystal Ball pick is LOCKED once the match has a result, is live, or its
// kickoff has passed. Fail-OPEN: if we can't parse a kickoff time we only lock
// on live/result — better to let a pick land slightly late than to wrongly lock
// a family member out before kickoff.
function pickLocked(m) {
  if (hasResult(m) || m.live) return true;
  const ko = matchKickoff(m);
  return ko ? Date.now() >= ko.getTime() : false;
}

// The legal Crystal Ball pick options for a match: group games can be drawn,
// knockouts always resolve to one side.
function cbOptions(m) {
  const t1 = mapTeamName(m.team1), t2 = mapTeamName(m.team2);
  return roundOf(m) === 'group' ? [t1, 'DRAW', t2] : [t1, t2];
}

// A player's saved Crystal Ball pick for a match (string), or null. Tolerates
// both numeric and string player-index keys (Firebase stringifies object keys).
function cbPickOf(m, i) {
  const p = state.predictions && state.predictions[matchKey(m)];
  if (!p) return null;
  return p[i] ?? p[String(i)] ?? null;
}

// Record a player's Crystal Ball pick and sync it (same path as a bounty pick).
function setCbPick(m, i, choice) {
  const key = matchKey(m);
  if (!state.predictions) state.predictions = {};
  if (!state.predictions[key]) state.predictions[key] = {};
  state.predictions[key][i] = choice;
  saveState();
}

// The Crystal Ball leaderboard: one row per player with round-weighted points,
// correct count, and picks-made. A correct pick pays ROUND_MULT[round] (group 1
// … Final 13). Entirely separate from the fantasy standings.
function cbBoard() {
  const players = state.players || [];
  const board = players.map((p, i) => ({ name: p.name, idx: i, pts: 0, correct: 0, made: 0 }));
  if (!board.length) return board;
  (state.matches || []).forEach(m => {
    const out = matchOutcome(m);
    if (out == null) return;                 // undecided — skip
    if (roundOf(m) !== 'group' && out === 'DRAW') return; // level KO awaiting pens — not yet scorable
    const weight = ROUND_MULT[roundOf(m)] || 1;
    board.forEach(row => {
      const pick = cbPickOf(m, row.idx);
      if (pick == null) return;              // no pick = no points (you must play to score)
      row.made++;
      if (pick === out) { row.pts += weight; row.correct++; }
    });
  });
  board.sort((a, b) => b.pts - a.pts || b.correct - a.correct || a.name.localeCompare(b.name));
  let lastPts = null, lastRank = 1;
  board.forEach((b, i) => { b.rank = b.pts === lastPts ? lastRank : i + 1; lastPts = b.pts; lastRank = b.rank; });
  return board;
}

// ============================================================================
// 6.  SCORING ENGINE
// ============================================================================

/**
 * Score a single match for both teams.
 * Returns { team1: { ownerIdx, pts, breakdown }, team2: { ... } }
 *
 * Wins-based scoring (simple & clear):
 *   Win:  3 pts  ×  round multiplier
 *   Draw: 1 pt   ×  round multiplier  (each team)
 *   Loss: 0 pts
 *
 * Knockout rounds also: +3 pts × multiplier to whoever advances
 * (regulation winner, or penalty-shootout winner if drawn).
 *
 * Goals scored / clean sheets / margin of victory do NOT add points.
 */
function scoreMatch(m) {
  if (m.score1 == null || m.score2 == null) return null;
  const round = roundOf(m);
  const mult = ROUND_MULT[round];
  const t1 = mapTeamName(m.team1);
  const t2 = mapTeamName(m.team2);

  // Guard against bad input (e.g. user types -1)
  const s1 = Math.max(0, Number(m.score1) || 0);
  const s2 = Math.max(0, Number(m.score2) || 0);
  const breakdown1 = [], breakdown2 = [];
  let pts1 = 0, pts2 = 0;
  const ko = round !== 'group';

  // Decide the winner. In knockouts a level score is broken by the penalty
  // shootout, and — HOUSE RULE (2026-06-17) — a shootout winner counts as a
  // FULL regulation winner: Win(3) + Advance(3) = 6×mult, loser 0. (Previously a
  // shootout scored draw(1)+advance(3) = only 4×mult for the winner, 1× loser.)
  // Equal pens is a typo, not a result, so it stays a genuine draw until fixed.
  let winner = null; // 1 | 2 | null (= genuine draw, group stage or pens pending)
  if (s1 > s2) winner = 1;
  else if (s2 > s1) winner = 2;
  else if (ko && m.pens1 != null && m.pens2 != null && Number(m.pens1) !== Number(m.pens2)) {
    winner = Number(m.pens1) > Number(m.pens2) ? 1 : 2;
  }

  // CIVIL WAR BOUNTY (house rule 2026-06-17): a KO match owned on BOTH sides by
  // the same player REPLACES normal scoring with the owner's side-bet — correct
  // pick → 3×mult, wrong → 1×mult. The points go to the WINNING team (the owner
  // owns both, so they net the bounty); the loser scores 0. Unpicked → favorite.
  if (ko && winner && isCivilWar(m)) {
    const pick = bountyPick(m);
    const winName = winner === 1 ? t1 : t2;
    const correct = pick === winName;
    const bounty = (correct ? 3 : 1) * mult;
    const wb = [{ label: correct ? '⚔️ Bounty ✓' : '⚔️ Bounty ✗', pts: bounty }];
    return {
      round, mult,
      team1: { name: t1, ownerIdx: ownerOfTeam(t1), pts: winner === 1 ? bounty : 0, breakdown: winner === 1 ? wb : [] },
      team2: { name: t2, ownerIdx: ownerOfTeam(t2), pts: winner === 2 ? bounty : 0, breakdown: winner === 2 ? wb : [] },
    };
  }

  // Result points
  if (winner === 1) {
    pts1 += 3; breakdown1.push({ label: 'Win', pts: 3 });
    breakdown2.push({ label: 'Loss', pts: 0 });
  } else if (winner === 2) {
    pts2 += 3; breakdown2.push({ label: 'Win', pts: 3 });
    breakdown1.push({ label: 'Loss', pts: 0 });
  } else {
    pts1 += 1; breakdown1.push({ label: 'Draw', pts: 1 });
    pts2 += 1; breakdown2.push({ label: 'Draw', pts: 1 });
  }

  // Group goal-differential bonus (HOUSE RULE 2026-06-17): on top of W/D/L, the
  // winner gains +min(margin,3) and the loser −min(margin,3) (capped at ±3, draw
  // 0) — mirroring how the World Cup uses goal difference to separate group
  // teams. Knockouts are single-elimination, so no GD bonus there.
  if (!ko && winner) {
    const gd = Math.min(Math.abs(s1 - s2), 3);
    if (winner === 1) { pts1 += gd; pts2 -= gd; breakdown1.push({ label: 'Goal diff', pts: gd }); breakdown2.push({ label: 'Goal diff', pts: -gd }); }
    else { pts2 += gd; pts1 -= gd; breakdown2.push({ label: 'Goal diff', pts: gd }); breakdown1.push({ label: 'Goal diff', pts: -gd }); }
  }

  // Knockout: advance bonus to the team that moves on (shootout winner included)
  if (ko && winner === 1) { pts1 += 3; breakdown1.push({ label: 'Advanced', pts: 3 }); }
  if (ko && winner === 2) { pts2 += 3; breakdown2.push({ label: 'Advanced', pts: 3 }); }

  // Apply round multiplier
  pts1 *= mult; pts2 *= mult;
  breakdown1.forEach(b => b.pts *= mult);
  breakdown2.forEach(b => b.pts *= mult);

  return {
    round, mult,
    team1: { name: t1, ownerIdx: ownerOfTeam(t1), pts: pts1, breakdown: breakdown1 },
    team2: { name: t2, ownerIdx: ownerOfTeam(t2), pts: pts2, breakdown: breakdown2 },
  };
}

function totalPoints(playerIdx) {
  let total = 0;
  state.matches.forEach(m => {
    const s = scoreMatch(m);
    if (!s) return;
    if (s.team1.ownerIdx === playerIdx) total += s.team1.pts;
    if (s.team2.ownerIdx === playerIdx) total += s.team2.pts;
  });
  return total;
}

function teamPoints(teamName) {
  let total = 0;
  const games = [];
  state.matches.forEach(m => {
    const s = scoreMatch(m);
    if (!s) return;
    if (s.team1.name === teamName) { total += s.team1.pts; games.push({m, side:1, pts: s.team1.pts, breakdown: s.team1.breakdown, round: s.round}); }
    if (s.team2.name === teamName) { total += s.team2.pts; games.push({m, side:2, pts: s.team2.pts, breakdown: s.team2.breakdown, round: s.round}); }
  });
  return { total, games };
}

// ============================================================================
// 7.  LIVE SCORE SYNC
// ============================================================================
// Primary score source is now the CLOUD STORE: a scheduled job (GitHub Action
// scripts/fetch-scores.mjs) pulls FINISHED matches from football-data.org and
// writes them into state.scoreOverrides in the cloud, because the openfootball
// feed below ships final scores days late or not at all. The openfootball feed
// is kept as a secondary source — it still usefully resolves knockout bracket
// placeholders (e.g. "1A" → "Mexico") and will backfill a score if it ever has
// one before the cloud does.
const FEED_URL = 'https://raw.githubusercontent.com/openfootball/worldcup.json/master/2026/worldcup.json';

// What the "Sync now / Sync scores" buttons call: pull the cloud first (that's
// where finals land), then run the feed sync for bracket resolution. Cloud
// scoreOverrides win — applyScoreOverrides() runs at the end of syncFromFeed.
async function syncScores(opts = {}) {
  const quiet = opts && opts.quiet === true;
  if (cloudConfigured()) {
    try { await pullFromCloud({ force: true, quiet: true }); } catch (e) { /* non-fatal */ }
  }
  await syncFromFeed(opts);
}

async function syncFromFeed(opts = {}) {
  // Button onclick passes a click event as the first arg — treat it as loud.
  const quiet = opts && opts.quiet === true;
  if (!quiet) toast('🦅 Pulling the latest scores…');
  try {
    const res = await fetch(FEED_URL, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (!data || !Array.isArray(data.matches)) throw new Error('Unexpected feed shape');
    let updated = 0, resolved = 0;
    data.matches.forEach(remote => {
      // One malformed feed entry must never abort the whole sync mid-loop.
      try {
      const t1 = mapTeamName(remote.team1);
      const t2 = mapTeamName(remote.team2);

      // For knockout games, prefer matching by num (placeholders get filled in over time)
      let local = null;
      if (remote.num != null) {
        local = state.matches.find(m => m.num === remote.num);
      }
      if (!local) {
        local = state.matches.find(m =>
          m.date === remote.date &&
          mapTeamName(m.team1) === t1 &&
          mapTeamName(m.team2) === t2
        );
      }
      if (!local) {
        // The 3rd-place match and the Final carry no num in the feed, and once
        // either side resolves its placeholders ("W101" → real team) the
        // date+teams match above breaks forever. They're unique per date, so
        // match them by date + round instead.
        const rRound = roundOf(remote);
        if (rRound === 'third' || rRound === 'final') {
          local = state.matches.find(m => m.date === remote.date && roundOf(m) === rRound);
        }
      }
      if (!local) return;

      // If the remote has resolved actual team names while local still has
      // placeholders (e.g. "1A" → "Mexico"), update them in place.
      if (TEAMS[t1] && !TEAMS[mapTeamName(local.team1)]) {
        local.team1 = t1; resolved++;
      }
      if (TEAMS[t2] && !TEAMS[mapTeamName(local.team2)]) {
        local.team2 = t2; resolved++;
      }

      // Pull scores in either supported schema. In openfootball, score.ft is
      // the 90-minute score — for knockout games that went to extra time the
      // result that counts is score.et (e.g. 2022 Final: ft 2-2, et 3-3, p 4-2).
      if (remote.score && Array.isArray(remote.score.ft)) {
        const fin = Array.isArray(remote.score.et) ? remote.score.et : remote.score.ft;
        local.score1 = fin[0];
        local.score2 = fin[1];
        if (Array.isArray(remote.score.p)) { local.pens1 = remote.score.p[0]; local.pens2 = remote.score.p[1]; }
        updated++;
      } else if (typeof remote.score1 !== 'undefined' && remote.score1 !== null) {
        local.score1 = remote.score1;
        local.score2 = remote.score2;
        if (remote.pens1 != null) { local.pens1 = remote.pens1; local.pens2 = remote.pens2; }
        updated++;
      }
      } catch (err) { console.warn('feed entry skipped', err, remote); }
    });
    // Manually entered scores (synced via scoreOverrides) beat the feed.
    applyScoreOverrides();
    state.lastSync = new Date().toISOString();
    // Feed data never goes to the cloud (matches/lastSync are stripped from the
    // payload), so a feed sync must never schedule a full-state cloud push —
    // on a stale device that push could overwrite the family's newer state.
    saveState({ skipCloudPush: true });
    // Quiet background syncs only re-render when something actually changed —
    // a 10-minute re-render would wipe half-typed score inputs.
    if (updated || resolved || !quiet) renderAll();
    const parts = [];
    if (updated) parts.push(`${updated} result${updated !== 1 ? 's' : ''}`);
    if (resolved) parts.push(`${resolved} bracket slot${resolved !== 1 ? 's' : ''} resolved`);
    if (!quiet) toast('Synced. ' + (parts.length ? parts.join(', ') + '.' : 'No new updates.'));
  } catch (e) {
    console.error('sync failed', e);
    if (!quiet) toast('Sync failed: ' + e.message + '. Enter scores manually below.', true);
  }
}

// ============================================================================
// 7.5  CLOUD SYNC (Firebase Realtime Database — project mwcga-c2e5e)
// ============================================================================
const CLOUD_API = 'https://mwcga-c2e5e-default-rtdb.firebaseio.com/games';
let _cloudPushTimer = null;
let _cloudPullTimer = null;

function cloudConfigured() { return !!state.cloudGameId; }

function stripCloudKeys(s) {
  // Don't store cloud meta inside the cloud blob — avoids recursion confusion.
  // Also drop matches/lastSync: they come from the public score feed, so each
  // device re-fetches them itself — keeps the cloud payload tiny and ensures a
  // stale device can never clobber fresher feed data. scoreOverrides DO sync.
  const copy = { ...s };
  delete copy.cloudGameId;
  delete copy.cloudLastPushed;
  delete copy.cloudLastPulled;
  delete copy.matches;
  delete copy.lastSync;
  // Device-local, tied to the code build — must never travel through the
  // cloud (old clients would round-trip it into their own localStorage).
  delete copy.scheduleVersion;
  return copy;
}

function newGameId() {
  const a = new Uint8Array(10);
  crypto.getRandomValues(a);
  return 'wc' + Array.from(a, (b) => (b % 36).toString(36)).join('');
}

let _pushInFlight = false;
let _pickBusy = false;
let _lastSeenSavedAt = null;
let _pullInFlight = false;          // one pull at a time (focus + visibility both fire)
let _lastPullInvalid = false;       // last pull reached the cloud but the blob failed validation
let _matchPreviews = {};            // match key → {html, mp3} briefing links (loaded at boot, 10c3)
let _matchPreviewsRaw = '';
let _newsArchive = [];              // [{date, mode, file, mp3}] past briefings (loaded at boot, 10c3)
let _newsArchiveRaw = '';
let _pushFailed = false;            // local state never reached the cloud (e.g. offline pick)
let _pushRetryTimer = null;
let _pushRetryDelay = 2000;
let _lastCloudContactAt = Date.now(); // last successful HTTP exchange with the cloud

// The cloud blob is world-writable and the game id travels in share links —
// never adopt a payload that doesn't look like a real game. Rejecting keeps
// local state, so the failure mode is "no sync", never "corrupted draft".
// (Firebase strips empty arrays/objects, so players/rosters may be absent.)
function validCloudState(s) {
  if (!s || typeof s !== 'object' || Array.isArray(s)) return false;
  const players = s.players ?? [];
  if (!Array.isArray(players) || players.length > 8) return false;
  if (!players.every(p => p && typeof p === 'object' && typeof p.name === 'string')) return false;
  if (!Number.isInteger(s.draftPickIdx) || s.draftPickIdx < 0 || s.draftPickIdx > 48) return false;
  if (s.draftPickIdx >= 48 && s.draftComplete !== true) return false; // idx 48 without completion would crash renderDraft
  if (s.rosters != null && typeof s.rosters !== 'object') return false;
  return true;
}

// All cloud requests get a hard timeout — a TCP-black-holed request would
// otherwise hold _pushInFlight/_pullInFlight for minutes and stall the draft.
function fetchWithTimeout(url, opts = {}, ms = 10000) {
  const ctrl = new AbortController();
  const tmo = setTimeout(() => ctrl.abort(), ms);
  return fetch(url, { ...opts, signal: ctrl.signal }).finally(() => clearTimeout(tmo));
}

// Manual scores entered on any device live in state.scoreOverrides, which
// syncs through the cloud blob; the matches list itself stays device-local.
// Re-apply overrides on top of local matches after every pull / feed sync.
function applyScoreOverrides() {
  if (!state.scoreOverrides || !Array.isArray(state.matches)) return;
  Object.entries(state.scoreOverrides).forEach(([key, o]) => {
    if (!o || typeof o !== 'object') return;
    const m = state.matches.find(x => (x.key || matchKey(x)) === key);
    if (!m) return;
    m.score1 = o.score1 ?? null; m.score2 = o.score2 ?? null;
    m.pens1 = o.pens1 ?? null;  m.pens2 = o.pens2 ?? null;
    // Official (API-sourced) results lock the match against hand-editing.
    m.official = o.official === true;
    // Live (ESPN poller) fields for the live score bug. An override with state
    // 'in' that isn't yet an official final = a match in progress right now.
    m.live = o.live === true && o.state === 'in' && o.official !== true;
    m.liveClock = o.clock || null;
    m.liveState = o.state || null;
    m.liveGoals = Array.isArray(o.goals) ? o.goals : null;
  });
}

async function createCloudGame() {
  toast('Creating cloud game…');
  try {
    const id = newGameId();
    const payload = { v: 1, savedAt: new Date().toISOString(), state: stripCloudKeys(state) };
    const res = await fetch(`${CLOUD_API}/${id}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    state.cloudGameId = id;
    state.cloudLastPushed = payload.savedAt;
    _lastSeenSavedAt = payload.savedAt;
    saveState({ skipCloudPush: true });
    renderAll();
    startCloudPolling();
    toast('Cloud game created. Copy the share link to send to your family.');
    return id;
  } catch (e) {
    console.error('createCloudGame failed', e);
    toast('Could not create cloud game: ' + e.message, true);
    return null;
  }
}

async function joinCloudGame(id, opts = {}) {
  id = (id || '').trim();
  if (!id) { toast('Enter a game code or paste a share link.', true); return false; }
  // Allow pasting a share URL — extract the ID
  const m = id.match(/[?&]game=([A-Za-z0-9_-]+)/) || id.match(/\b(wc[a-z0-9]{10})\b/);
  if (m) id = m[1];
  if (!opts.silent) toast('Joining cloud game…');
  try {
    const res = await fetch(`${CLOUD_API}/${id}.json`, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status + ' — could not reach cloud');
    const payload = await res.json();
    if (payload === null) throw new Error('Game code not found.');
    if (!payload.state || !validCloudState(payload.state)) throw new Error('Unexpected payload from cloud.');
    // Warn if user already has a draft locally
    const hasLocal = state.players && state.players.length > 0 && state.cloudGameId !== id;
    if (hasLocal && !opts.overwriteSilently) {
      if (!confirm('Joining this cloud game will replace your local draft and scores with the family\'s shared game. Continue?')) {
        return false;
      }
    }
    // Adopt remote state — preserve cloud connection metadata + local feed data
    const localMatches = state.matches, localLastSync = state.lastSync, localSchedVer = state.scheduleVersion;
    state = { ...JSON.parse(JSON.stringify(DEFAULT_STATE)), ...payload.state };
    state.matches = localMatches || [];
    state.lastSync = localLastSync || null;
    state.scheduleVersion = localSchedVer;
    state.cloudGameId = id;
    state.cloudLastPulled = new Date().toISOString();
    _lastSeenSavedAt = payload.savedAt || null;
    applyScoreOverrides();
    saveState({ skipCloudPush: true });
    renderAll();
    startCloudPolling();
    if (!opts.silent) toast('Joined! Updates will sync automatically across devices.');
    return true;
  } catch (e) {
    console.error('joinCloudGame failed', e);
    if (!opts.silent) toast('Join failed: ' + e.message, true);
    return false;
  }
}

const DIRTY_KEY = 'wc2026_dirty_v1'; // persists "unsynced local state" across reloads

function clearDirty() {
  _pushFailed = false;
  _pushRetryDelay = 2000;
  if (_pushRetryTimer) { clearTimeout(_pushRetryTimer); _pushRetryTimer = null; }
  try { localStorage.removeItem(DIRTY_KEY); } catch (e) {}
}

// Count of matches that carry a saved score (official or manual). During the
// tournament this only ever grows — scores get added or corrected, never mass-
// deleted — so a remote blob with strictly FEWER scored matches than ours is a
// stale device about to roll the live game back. This is the tournament-mode
// analog of the draft-progress guard (which goes inert once draftPickIdx is
// frozen at 48), and it's what stops a stale phone from clobbering real scores.
function scoredCount(s) {
  const ov = s && s.scoreOverrides;
  return ov && typeof ov === 'object' ? Object.keys(ov).length : 0;
}

async function _doPushToCloud(opts = {}) {
  if (!cloudConfigured()) return false;
  // ANTI-CLOBBER: read before every write. If the cloud already holds MORE
  // draft progress than this device (a later pick, or a completed draft we
  // haven't seen), our snapshot is stale and pushing it would erase real
  // picks — the exact failure that wiped the draft on 2026-06-11. So we adopt
  // the cloud instead of overwriting it. The ONLY exception is an explicit
  // forcePush (the manual "Push my board" button), which the user invokes
  // precisely because their device is the source of truth.
  if (!opts.forcePush) {
    try {
      const probe = await fetchWithTimeout(`${CLOUD_API}/${state.cloudGameId}.json`, { cache: 'no-store' });
      if (probe.ok) {
        const p = await probe.json();
        if (p && p.state && validCloudState(p.state)) {
          const remoteIdx = typeof p.state.draftPickIdx === 'number' ? p.state.draftPickIdx : -1;
          const localIdx = state.draftPickIdx || 0;
          const remoteAhead = remoteIdx > localIdx ||
            (p.state.draftComplete === true && !state.draftComplete) ||
            (state.draftComplete === true && scoredCount(p.state) > scoredCount(state));
          if (remoteAhead) {
            clearDirty();
            toast('The board moved on elsewhere — refreshing instead of overwriting.', true);
            pullFromCloud({ force: true, quiet: true });
            return false;
          }
        }
      }
    } catch (e) { /* cloud unreachable — the PUT below will fail and re-arm the retry */ }
  }
  _pushInFlight = true;
  try {
    const payload = { v: 1, savedAt: new Date().toISOString(), state: stripCloudKeys(state) };
    const res = await fetchWithTimeout(`${CLOUD_API}/${state.cloudGameId}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    state.cloudLastPushed = payload.savedAt;
    _lastSeenSavedAt = payload.savedAt;
    _lastCloudContactAt = Date.now();
    clearDirty();
    saveState({ skipCloudPush: true });
    updateCloudStatusLine();
    return true;
  } catch (e) {
    console.error('pushToCloud failed', e);
    // Keep our word to the user: retry with backoff until this state lands.
    // Until it does, _pushFailed also blocks pulls from silently overwriting
    // the unsynced local data (see pullFromCloud), and the dirty flag persists
    // so a page reload can't discard an unsynced pick either.
    _pushFailed = true;
    try { localStorage.setItem(DIRTY_KEY, '1'); } catch (e2) {}
    clearTimeout(_pushRetryTimer);
    _pushRetryTimer = setTimeout(() => { _pushRetryTimer = null; pushToCloud(); }, _pushRetryDelay);
    _pushRetryDelay = Math.min(_pushRetryDelay * 2, 30000);
    updateCloudStatusLine();
    return false; // transient — state stays in localStorage
  } finally {
    _pushInFlight = false;
  }
}

// All pushes are serialized through a promise chain so overlapping PUTs can't
// land at Firebase out of order; each push snapshots state when its turn comes.
let _pushChain = Promise.resolve(false);
function pushToCloud(opts = {}) {
  const run = () => _doPushToCloud(opts);
  _pushChain = _pushChain.then(run, run);
  return _pushChain;
}

// Manual, deliberate upload: "this device's board is the truth — put it in the
// cloud now," bypassing the anti-clobber probe. Used by the Push-my-board button
// and as the recovery path if a device ever shows the right board but the cloud
// is behind (exactly the 2026-06-11 incident).
async function forcePushToCloud() {
  if (!cloudConfigured()) { toast('Not connected to a cloud game.', true); return false; }
  const picks = (state.rosters && Object.values(state.rosters).reduce((n, r) => n + (Array.isArray(r) ? r.filter(Boolean).length : 0), 0)) || 0;
  if (!confirm(`Upload THIS device's board to the cloud, replacing what's there?\n\n${state.players?.length || 0} players, ${picks} picks drafted.\n\nUse this if other devices are missing picks that you can see here.`)) return false;
  _pushFailed = false;
  const ok = await pushToCloud({ forcePush: true });
  toast(ok ? '✅ Your board is now saved to the cloud for everyone.' : '❌ Upload failed — check your connection and try again.', !ok);
  return ok;
}

async function pullFromCloud(opts = {}) {
  if (!cloudConfigured()) return false;
  if (_pushInFlight) return false; // don't pull mid-push
  if (_pullInFlight) {
    // A background poll is mid-pull. Plain pulls just skip; a FORCED pull
    // (pick verification, Sync now) must not lose that race — wait it out,
    // then do its own fresh read.
    if (!opts.force) return false;
    for (let i = 0; i < 50 && _pullInFlight; i++) await new Promise(r => setTimeout(r, 100));
    if (_pullInFlight) return false; // still stuck after 5s — fail closed
    // The world may have changed during the wait — re-run the entry guards.
    if (_pushInFlight || _pushFailed) return false;
  }
  // Local state that never reached the cloud (e.g. a pick made offline) must
  // be pushed before anything remote is adopted — adopting first would
  // silently delete the unsynced pick from the only place it exists.
  if (_pushFailed) {
    if (!_pushRetryTimer && !_pushInFlight) pushToCloud();
    return false;
  }
  _pullInFlight = true;
  try {
    const res = await fetchWithTimeout(`${CLOUD_API}/${state.cloudGameId}.json`, { cache: 'no-store' });
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const payload = await res.json();
    _lastCloudContactAt = Date.now();
    if (!payload || !payload.state || !validCloudState(payload.state)) {
      if (payload) console.warn('pullFromCloud: ignoring malformed cloud payload');
      _lastPullInvalid = !!payload;
      return false;
    }
    _lastPullInvalid = false;
    // Already seen this exact version: nothing to adopt. For forced pulls
    // that's a SUCCESS ("the board is provably current") — and skipping the
    // re-render keeps focus pulls from wiping half-typed inputs.
    if (payload.savedAt && payload.savedAt === _lastSeenSavedAt) return !!opts.force;
    // Skip if remote isn't strictly newer than what we last pushed
    // (last-write-wins) — UNLESS the draft has visibly advanced remotely.
    // savedAt comes from each device's wall clock, so a skewed clock must
    // never be able to hide real draft progress from this device.
    const remoteIdx = typeof payload.state.draftPickIdx === 'number' ? payload.state.draftPickIdx : -1;
    const draftAdvanced = remoteIdx > (state.draftPickIdx || 0) ||
      (!state.draftComplete && payload.state.draftComplete === true);
    if (!opts.force && !draftAdvanced && state.cloudLastPushed && payload.savedAt && payload.savedAt <= state.cloudLastPushed) {
      _lastSeenSavedAt = payload.savedAt;
      return false;
    }
    // PROGRESS-REGRESSION GUARD (applies even to forced pulls): draft progress
    // only ever moves forward. If the cloud has STRICTLY FEWER picks than this
    // device — and isn't more draft-complete — it's a stale/empty snapshot
    // (e.g. a device that never drafted pushed its blank state). Adopting it
    // would erase real picks from the one place they live. This is the guard
    // that would have prevented the 2026-06-11 wipe. We refuse to adopt and,
    // if our board never reached the cloud, push it up to heal the cloud.
    const localIdx = state.draftPickIdx || 0;
    const remoteRegressed = remoteIdx < localIdx && !(payload.state.draftComplete === true && !state.draftComplete);
    if (remoteRegressed) {
      console.warn(`pullFromCloud: refusing to adopt regressed cloud state (remote ${remoteIdx} < local ${localIdx}). Healing cloud from this device.`);
      _lastSeenSavedAt = payload.savedAt || null;
      // Our board is ahead — make sure the cloud gets it (won't clobber: the
      // push does its own anti-clobber probe, and here local is provably ahead).
      pushToCloud({ forcePush: true });
      return false;
    }
    const cloudGameId = state.cloudGameId;
    const localMatches = state.matches, localLastSync = state.lastSync, localSchedVer = state.scheduleVersion;
    state = { ...JSON.parse(JSON.stringify(DEFAULT_STATE)), ...payload.state };
    state.matches = localMatches || [];
    state.lastSync = localLastSync || null;
    state.scheduleVersion = localSchedVer;
    state.cloudGameId = cloudGameId;
    state.cloudLastPulled = new Date().toISOString();
    _lastSeenSavedAt = payload.savedAt || null;
    applyScoreOverrides();
    saveState({ skipCloudPush: true });
    // Preserve scroll position — background pulls shouldn't yank the page around
    const y = window.scrollY;
    renderAll();
    window.scrollTo(0, y);
    if (opts.force && !opts.quiet) toast('Synced from cloud.');
    return true;
  } catch (e) {
    console.error('pullFromCloud failed', e);
    if (opts.force && !opts.quiet) toast('Pull failed: ' + e.message, true);
    return false;
  } finally {
    _pullInFlight = false;
  }
}

function disconnectCloud() {
  state.cloudGameId = null;
  state.cloudLastPushed = null;
  state.cloudLastPulled = null;
  stopCloudPolling();
  if (_pushRetryTimer) { clearTimeout(_pushRetryTimer); _pushRetryTimer = null; }
  _pushFailed = false;
  _pushRetryDelay = 2000;
  saveState({ skipCloudPush: true });
  renderAll();
  toast('Disconnected. Your local data is unchanged.');
}

function debouncedCloudPush() {
  if (!cloudConfigured()) return;
  clearTimeout(_cloudPushTimer);
  _cloudPushTimer = setTimeout(pushToCloud, 1500);
}

function pollMs() {
  // Draft night needs near-live updates; afterwards a lazy poll is plenty.
  const drafting = state.players && state.players.length > 0 && !state.draftComplete;
  return drafting ? 4000 : 45000;
}

function stopCloudPolling() {
  if (_cloudPullTimer) { clearTimeout(_cloudPullTimer); _cloudPullTimer = null; }
}

function startCloudPolling() {
  stopCloudPolling();
  const loop = async () => {
    if (!cloudConfigured()) { _cloudPullTimer = null; return; }
    if (!document.hidden && !_pickBusy) {
      try { await pullFromCloud(); } catch (e) { /* transient */ }
      // Keep the connection indicators honest even when nothing new arrived
      updateCloudStatusLine();
      renderScoreboard();
    }
    _cloudPullTimer = setTimeout(loop, pollMs());
  };
  _cloudPullTimer = setTimeout(loop, pollMs());
}

// True when we haven't successfully reached the cloud for ~3 poll cycles.
function cloudLooksStale() {
  if (!cloudConfigured()) return false;
  return (Date.now() - _lastCloudContactAt) > (pollMs() * 3 + 5000);
}

function shareableLink() {
  if (!cloudConfigured()) return '';
  const base = window.location.origin + window.location.pathname;
  return `${base}?game=${state.cloudGameId}`;
}

function updateCloudStatusLine() {
  const line = document.getElementById('cloud-status-text');
  if (line && cloudConfigured()) {
    if (cloudLooksStale()) {
      line.textContent = '⚠️ Can\'t reach the cloud — this device may be showing old picks/scores';
      line.style.color = 'var(--accent-2)';
    } else {
      const ts = state.cloudLastPushed || state.cloudLastPulled;
      line.textContent = ts
        ? `✓ Connected · last sync ${new Date(ts).toLocaleTimeString()}`
        : '✓ Connected';
      line.style.color = 'var(--green)';
    }
  }
}

// ============================================================================
// 8.  RENDER HELPERS
// ============================================================================
function $(sel) { return document.querySelector(sel); }
function el(tag, attrs = {}, ...kids) {
  const e = document.createElement(tag);
  Object.entries(attrs).forEach(([k,v]) => {
    if (k === 'class') e.className = v;
    else if (k === 'style') e.setAttribute('style', v);
    else if (k.startsWith('on') && typeof v === 'function') e[k] = v;
    else if (v !== undefined && v !== null) e.setAttribute(k, v);
  });
  kids.flat().forEach(k => {
    if (k == null) return;
    if (typeof k === 'string' || typeof k === 'number') e.appendChild(document.createTextNode(k));
    else e.appendChild(k);
  });
  return e;
}
function toast(msg, isError = false) {
  document.querySelectorAll('.toast').forEach(t => t.remove());
  const t = el('div', { class: 'toast' + (isError ? ' error' : '') }, msg);
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
}

function ownerPill(idx) {
  if (idx < 0) return el('span', { class: 'owner-tag', style: 'background: var(--spoiler); color: white;' }, 'Spoiler');
  const p = state.players[idx];
  return el('span', { class: 'owner-tag', style: `background: ${PLAYER_COLORS[idx]}` }, p ? p.name : '?');
}

function seedBadge(teamName) {
  const seed = TEAMS[teamName]?.seed;
  if (!seed) return null;
  const cfg = SEED_LABEL[seed];
  return el('span', {
    class: 'seed-badge',
    style: `background: ${cfg.bg}; color: ${cfg.color};`,
    title: `#${seed} in group by tournament odds`
  },
    el('span', { class: 'num' }, '#' + seed),
    cfg.text
  );
}

// ── TURN ALERT ── buzz/flag this device when one of its claimed players goes
// on the clock; a phone on the couch should announce its owner's turn.
let _lastAlertedPickIdx = null;
const BASE_TITLE = document.title;
function maybeAlertTurn() {
  if (!state.players || state.players.length === 0 || state.draftComplete) {
    document.title = BASE_TITLE;
    return;
  }
  const pick = currentPick();
  const mine = pick && deviceSeats().includes(pick.playerIdx);
  if (mine) {
    document.title = '🔔 YOUR TURN — MWCGA';
    if (_lastAlertedPickIdx !== state.draftPickIdx) {
      _lastAlertedPickIdx = state.draftPickIdx;
      try { if (navigator.vibrate) navigator.vibrate([200, 100, 200]); } catch (e) {}
      const who = state.players[pick.playerIdx];
      toast(`⭐ ${who ? who.name : 'You'} — YOU'RE ON THE CLOCK! Group ${pick.group}.`);
    }
  } else {
    document.title = BASE_TITLE;
  }
}

function renderAll() {
  renderScoreboard();
  renderToday();

// ----- HEADER SCOREBOARD -----
function renderScoreboard() {
  const sb = $('#scoreboard');
  sb.innerHTML = '';
  if (!state.players || state.players.length === 0) {
    sb.appendChild(el('span', { class: 'small' }, 'Set up players in the Draft tab →'));
    return;
  }
  state.players.forEach((p, i) => {
    const pts = totalPoints(i);
    sb.appendChild(el('div', { class: 'score-pill' },
      el('span', { class: 'dot', style: `background: ${PLAYER_COLORS[i]}` }),
      el('span', {}, p.name),
      el('span', { class: 'pts' }, pts + ' pts')
    ));
  });
  // LIVE indicator — appears only while a match is in progress; tap it to jump
  // to the live score bug on the Today tab.
  const _live = liveMatches();
  if (_live.length) {
    sb.appendChild(el('div', {
      class: 'score-pill live-pill',
      title: 'A match is in progress — tap for the live score bug',
      onclick: () => { switchTab('today'); setTimeout(() => { const b = document.getElementById('livebug'); if (b) b.scrollIntoView({ behavior: 'smooth', block: 'center' }); }, 60); }
    },
      el('span', { class: 'live-dot' }),
      el('span', {}, `LIVE · ${_live.length}`)
    ));
  }

  // Cloud-sync indicator — goes loud when the cloud hasn't answered lately,
  // so nobody trusts a frozen board.
  if (cloudConfigured()) {
    const stale = cloudLooksStale();
    sb.appendChild(el('div', {
      class: 'score-pill',
      title: stale ? 'No answer from the cloud — this board may be out of date. Try Settings → Sync now.'
                   : 'Cloud-synced — all family devices see live updates',
      style: stale
        ? 'background: rgba(178, 34, 52, 0.2); border-color: var(--accent-2); color: #ffb3bd;'
        : 'background: rgba(6, 214, 160, 0.12); border-color: var(--green); color: var(--green);'
    },
      el('span', {}, stale ? '📡' : '🌐'),
      el('span', { style: 'font-size: 12px;' }, stale ? 'Reconnecting…' : 'Live')
    ));
  }
}

// ----- LIVE SCORE BUG (broadcast-style, driven by the ESPN live poller) -----
// Matches flagged `m.live` (the poller's override state is 'in' and no official
// final has landed) get a prominent, pulsing live readout: score + match clock
// + the LIVE FANTASY POINTS each side is banking for its owner right this second
// — the one thing no broadcaster's score bug can show.
function liveMatches() {
  return state.matches.filter(m => m.live && hasResult(m));
}

function renderLiveBug() {
  const lm = liveMatches();
  if (!lm.length) return null;
  const wrap = el('div', { class: 'livebug-wrap', id: 'livebug' });
  wrap.appendChild(el('div', { class: 'livebug-head' },
    el('span', { class: 'live-dot' }),
    el('span', {}, `LIVE NOW · ${lm.length} MATCH${lm.length > 1 ? 'ES' : ''}`)
  ));
  lm.forEach(m => wrap.appendChild(renderLiveMatch(m)));
  return wrap;
}

function renderLiveMatch(m) {
  const round = roundOf(m), mult = ROUND_MULT[round];
  const t1 = mapTeamName(m.team1), t2 = mapTeamName(m.team2);
  const o1 = ownerOfTeam(t1), o2 = ownerOfTeam(t2);
  const sc = scoreMatch(m); // provisional live points (scores in-progress as if final)
  const card = el('div', { class: 'livebug' });

  card.appendChild(el('div', { class: 'livebug-row' },
    el('div', { class: 'lb-team lb-t1' },
      el('span', { class: 'lb-flag' }, TEAMS[t1]?.flag || '⚽'),
      el('span', { class: 'lb-name' }, t1),
      o1 >= 0 ? el('span', { class: 'gt-owner', style: `background:${PLAYER_COLORS[o1]}` }) : null),
    el('div', { class: 'lb-score lb-s1' }, String(m.score1 ?? 0)),
    el('div', { class: 'lb-clock' },
      el('span', { class: 'live-dot' }),
      el('span', {}, m.liveClock || 'LIVE')),
    el('div', { class: 'lb-score lb-s2' }, String(m.score2 ?? 0)),
    el('div', { class: 'lb-team lb-team-r' },
      o2 >= 0 ? el('span', { class: 'gt-owner', style: `background:${PLAYER_COLORS[o2]}` }) : null,
      el('span', { class: 'lb-name' }, t2),
      el('span', { class: 'lb-flag' }, TEAMS[t2]?.flag || '⚽'))
  ));

  // Goal scorers (from the ESPN poller) — ⚽ name + minute, per side.
  if (Array.isArray(m.liveGoals) && m.liveGoals.length) {
    const fmt = g => `${g.who}${g.clock ? ' ' + g.clock : ''}`;
    const g1 = m.liveGoals.filter(g => g.team === 1).map(fmt);
    const g2 = m.liveGoals.filter(g => g.team === 2).map(fmt);
    if (g1.length || g2.length) {
      card.appendChild(el('div', { class: 'lb-goals' },
        el('div', { class: 'lb-goals-side' }, g1.map(s => el('div', {}, '⚽ ' + s))),
        el('div', { class: 'lb-goals-side lb-goals-r' }, g2.map(s => el('div', {}, s + ' ⚽')))
      ));
    }
  }

  const stakes = el('div', { class: 'lb-stakes' });
  stakes.appendChild(el('span', { class: 'lb-mult' }, `${ROUND_NAME[round]} · ×${mult}`));
  if (sc) {
    const earn = [];
    if (o1 >= 0) earn.push(`${state.players[o1]?.name || '—'} ${sc.team1.pts >= 0 ? '+' : ''}${sc.team1.pts}`);
    if (o2 >= 0) earn.push(`${state.players[o2]?.name || '—'} ${sc.team2.pts >= 0 ? '+' : ''}${sc.team2.pts}`);
    if (earn.length) stakes.appendChild(el('span', { class: 'lb-earn' }, '🔴 LIVE PTS: ' + earn.join(' · ')));
  }
  card.appendChild(stakes);
  if (m.pens1 != null && m.pens2 != null) {
    card.appendChild(el('div', { class: 'small', style: 'text-align:center; margin-top:5px; color:var(--accent);' }, `Shootout ${m.pens1}–${m.pens2}`));
  }
  return card;
}

function hasResult(m) {
  return m.score1 != null && m.score2 != null;
}

function switchTab(name) {
