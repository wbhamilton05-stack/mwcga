}

// ----- MATCH CARD (reused everywhere) -----
function renderMatchCard(m, showOwners = true, showOdds = false) {
  const round = roundOf(m);
  const mult = ROUND_MULT[round];
  const t1 = mapTeamName(m.team1);
  const t2 = mapTeamName(m.team2);
  const flag1 = TEAMS[t1]?.flag || '⚽';
  const flag2 = TEAMS[t2]?.flag || '⚽';
  const ownerIdx1 = ownerOfTeam(t1);
  const ownerIdx2 = ownerOfTeam(t2);

  const ownerClass = (() => {
    if (ownerIdx1 < 0 && ownerIdx2 < 0) return '';
    if (ownerIdx1 >= 0 && ownerIdx2 >= 0) return ''; // both owned: no border
    return ownerIdx1 >= 0 ? `owned-p${ownerIdx1+1}` : `owned-p${ownerIdx2+1}`;
  })();

  const card = el('div', { class: 'match-card ' + ownerClass });

  // Meta row
  card.appendChild(el('div', { class: 'match-meta' },
    el('span', {}, `${m.date} · ${centralTime(m.time) || ''} · ${m.ground || ''}`),
    el('span', {},
      el('span', { class: 'badge' + (round !== 'group' ? ' ko' : '') }, ROUND_NAME[round]),
      mult > 1 ? el('span', { class: 'badge', style: 'margin-left:6px; background: var(--accent); color: #1a1a1a; border-color: var(--accent);' }, `×${mult}`) : null,
    ),
  ));

  // Teams + score
  const scored = hasResult(m);
  const scoreText = scored ? `${m.score1}–${m.score2}` : (m.time ? 'TBD' : '—');
  const teamsRow = el('div', { class: 'match-teams' },
    el('div', { class: 'match-team' },
      el('span', { class: 'flag' }, flag1),
      el('span', {}, t1),
      showOwners ? ownerPill(ownerIdx1) : null,
    ),
    el('div', { class: 'score' + (scored ? ' live' : ' scheduled') }, scoreText),
    el('div', { class: 'match-team right' },
      showOwners ? ownerPill(ownerIdx2) : null,
      el('span', {}, t2),
      el('span', { class: 'flag' }, flag2),
    ),
  );
  card.appendChild(teamsRow);

  // Vegas desk — draft-night odds strip. Kept ON even after the final whistle so
  // you can relive how it was SUPPOSED to go ("Portugal was 88% and TIED?!").
  // Skipped only for KO placeholders with no odds (W101 etc).
  if (showOdds) {
    const pct1 = h2hPct(t1, t2);
    if (pct1 != null) {
      const pct2 = 100 - pct1;
      const w1 = Math.round(pct1), w2 = 100 - w1;
      card.appendChild(el('div', {
        class: 'odds-strip',
        title: 'Locked draft-night title odds — bragging-rights math, draws not modeled. These never move; the scoreboard does the talking.'
      },
        el('div', { class: 'odds-row' },
          el('span', { class: 'odds-val' }, `🏆 ${TITLE_ODDS[t1]} · ${titlePctLabel(t1)}`),
          el('span', { class: 'odds-label' }, 'TITLE ODDS · CHANCE'),
          el('span', { class: 'odds-val right' }, `🏆 ${TITLE_ODDS[t2]} · ${titlePctLabel(t2)}`)),
        el('div', { class: 'odds-bar' },
          el('div', { class: 'l', style: `width:${pct1.toFixed(1)}%` }),
          el('div', { class: 'r' })),
        el('div', { class: 'odds-row' },
          el('span', { class: 'odds-val' }, `${w1}% · ${bookFraction(pct1)}`),
          el('span', { class: 'odds-label' }, 'WIN CHANCE · ODDS'),
          el('span', { class: 'odds-val right' }, `${w2}% · ${bookFraction(pct2)}`)),
        el('div', { class: 'odds-row' },
          el('span', { class: 'odds-val' }, moneyline(pct1)),
          el('span', { class: 'odds-label' }, 'MONEY LINE'),
          el('span', { class: 'odds-val right' }, moneyline(pct2))),
      ));
      // Outcome vs. the odds — the "relive the upset" payoff on finished games.
      if (scored) {
        const winner = matchWinnerSide(m); // 1 | 2 | null (draw)
        const favIsT1 = pct1 >= 50;
        const favName = favIsT1 ? t1 : t2, dogName = favIsT1 ? t2 : t1;
        const favPct = Math.round(favIsT1 ? pct1 : pct2);
        let txt, cls = 'outcome-chalk';
        if (winner == null) {
          if (favPct >= 60) { txt = `😱 STUNNER — ${favName} was a ${favPct}% favorite and only TIED. ${dogName} hung on!`; cls = 'outcome-upset'; }
          else txt = '🤝 Coin-flip game — they split the points.';
        } else {
          const winName = winner === 1 ? t1 : t2;
          if (winName === favName) txt = `✅ Chalk holds — ${favName} (${favPct}%) took care of business.`;
          else { txt = `🚨 UPSET! ${dogName} (${100 - favPct}%) BEAT ${favName} (${favPct}%). Bracket-buster!`; cls = 'outcome-upset'; }
        }
        card.appendChild(el('div', { class: 'match-outcome ' + cls }, txt));
      }
    }
  }

  // ⚔️ CIVIL WAR BOUNTY pick control — upcoming KO match, two same-owner teams.
  // The owner predicts which of their two teams wins (right → 3×, wrong → 1×).
  // Gated to the owner's device only when seats are claimed (else family trust).
  if (isCivilWar(m) && !scored) {
    const owner = ownerOfTeam(t1);
    const pick = bountyPick(m);
    const saved = state.bounties && state.bounties[matchKey(m)];
    const mayPick = deviceMayPick(owner);
    const wrap = el('div', { style: 'margin-top:8px; padding:9px; border:1px solid var(--accent); border-radius:8px; background:rgba(255,255,255,0.04);' });
    wrap.appendChild(el('div', { style: 'text-align:center; font-weight:800; letter-spacing:0.5px; color: var(--accent);' }, '⚔️ CIVIL WAR BOUNTY'));
    wrap.appendChild(el('div', { class: 'small', style: 'text-align:center; margin-top:2px;' },
      `${state.players[owner]?.name || 'This owner'} owns both sides — pick the winner. Right → 3×, wrong → 1× (×${mult} round).`));
    const btns = el('div', { class: 'row', style: 'margin-top:7px; justify-content:center;' });
    [t1, t2].forEach(name => {
      const chosen = pick === name;
      btns.appendChild(el('button', {
        class: chosen ? '' : 'ghost',
        onclick: () => {
          if (!mayPick) { toast('Only ' + (state.players[owner]?.name || 'the owner') + "'s device can set this bounty.", true); return; }
          if (!state.bounties) state.bounties = {};
          state.bounties[matchKey(m)] = name;
          saveState();
          renderAll();
          toast('⚔️ Bounty pick: ' + name);
        }
      }, `${TEAMS[name]?.flag || '⚽'} ${name}${chosen ? ' ✓' : ''}`));
    });
    wrap.appendChild(btns);
    wrap.appendChild(el('div', { class: 'small', style: 'text-align:center; margin-top:5px; color: var(--muted);' },
      saved ? `Locked pick: ${saved}` : `No pick yet — defaulting to favorite: ${pick}`));
    card.appendChild(wrap);
  }

  // Pen shootout indicator
  if (scored && m.pens1 != null && m.pens2 != null) {
    card.appendChild(el('div', { class: 'small', style: 'text-align:center; margin-top:4px;' },
      `Pens: ${m.pens1}–${m.pens2}`));
  }

  // Score breakdown for played matches — show BOTH sides explicitly
  // so nobody wonders why a player did or didn't get points.
  if (scored) {
    const s = scoreMatch(m);
    if (s) {
      const extras = el('div', { class: 'match-extras' });
      const renderSide = (side, name) => {
        if (side.ownerIdx < 0) return;
        const breakdown = side.breakdown.map(b => b.label).join(' + ') || '—';
        const bg = side.pts > 0 ? PLAYER_COLORS[side.ownerIdx] : 'rgba(255,255,255,0.08)';
        const fg = side.pts > 0 ? '#1a1a1a' : 'var(--muted)';
        const border = side.pts > 0 ? 'transparent' : 'var(--border)';
        extras.appendChild(el('span', {
          class: 'pts-pill',
          style: `background: ${bg}; color: ${fg}; border: 1px solid ${border};`
        }, `${state.players[side.ownerIdx].name}: ${side.pts > 0 ? '+' : ''}${side.pts}  ·  ${breakdown}`));
      };
      renderSide(s.team1, mapTeamName(m.team1));
      renderSide(s.team2, mapTeamName(m.team2));
      if (s.mult > 1) {
        extras.appendChild(el('span', { class: 'pts-pill', style: 'background: var(--accent); color: #1a1a1a;' },
          `×${s.mult} ${ROUND_NAME[s.round]} multiplier`));
      }
      card.appendChild(extras);
    }
  }

  // Match briefing + podcast links (generated overnight by the previews cron;
  // the manifest maps match keys → artifact paths, absent = no links shown)
  const pv = _matchPreviews[m.key || matchKey(m)];
  if (pv && (pv.html || pv.mp3)) {
    card.appendChild(el('div', { style: 'display:flex; gap:14px; margin-top:6px; justify-content:center;' },
      pv.html ? el('a', { href: pv.html, target: '_blank', rel: 'noopener',
        style: 'color: var(--accent); font-weight:700; font-size:13px; text-decoration:none;' }, '📰 Match Briefing') : null,
      pv.mp3 ? el('a', { href: pv.mp3, target: '_blank', rel: 'noopener',
        style: 'color: var(--accent); font-weight:700; font-size:13px; text-decoration:none;' }, '🎙️ Listen') : null,
    ));
  }

  // Official API results are LOCKED — show a read-only badge, no edit form.
  if (m.official) {
    card.appendChild(el('div', {
      class: 'small',
      style: 'margin-top: 8px; color: var(--green); font-weight: 700;',
      title: 'This is the official final from the live score feed and cannot be edited.'
    }, '🔒 Official result · locked'));
    return card;
  }

  // Inline manual score entry
  const entryRow = el('details', {},
    el('summary', {}, scored ? '✏️ Edit score' : '➕ Enter score'),
    (() => {
      const wrap = el('div', { class: 'row', style: 'margin-top: 8px;' });
      const s1in = el('input', { type: 'number', class: 'score-input', min: 0, value: m.score1 ?? '', inputmode: 'numeric' });
      const s2in = el('input', { type: 'number', class: 'score-input', min: 0, value: m.score2 ?? '', inputmode: 'numeric' });
      const pens1 = el('input', { type: 'number', class: 'score-input', min: 0, value: m.pens1 ?? '', placeholder: 'pens', inputmode: 'numeric' });
      const pens2 = el('input', { type: 'number', class: 'score-input', min: 0, value: m.pens2 ?? '', placeholder: 'pens', inputmode: 'numeric' });
      wrap.appendChild(el('span', {}, `${t1}:`));
      wrap.appendChild(s1in);
      wrap.appendChild(el('span', {}, `${t2}:`));
      wrap.appendChild(s2in);
      if (round !== 'group') {
        wrap.appendChild(el('span', { class: 'small' }, '(pens if drawn):'));
        wrap.appendChild(pens1);
        wrap.appendChild(pens2);
      }
      wrap.appendChild(el('button', { onclick: () => {
        m.score1 = s1in.value === '' ? null : Number(s1in.value);
        m.score2 = s2in.value === '' ? null : Number(s2in.value);
        m.pens1 = pens1.value === '' ? null : Number(pens1.value);
        m.pens2 = pens2.value === '' ? null : Number(pens2.value);
        // Record as a synced override so every household sees a hand-entered
        // score (matches themselves never travel through the cloud).
        if (!state.scoreOverrides) state.scoreOverrides = {};
        if (m.score1 != null && m.score2 != null) {
          state.scoreOverrides[m.key || matchKey(m)] =
            { score1: m.score1, score2: m.score2, pens1: m.pens1, pens2: m.pens2 };
        } else {
          delete state.scoreOverrides[m.key || matchKey(m)];
        }
        saveState();
        renderAll();
        toast(cloudConfigured() ? 'Score saved — syncing to the family.' : 'Score saved.');
      }}, 'Save'));
      if (scored) {
        wrap.appendChild(el('button', { class: 'ghost', onclick: () => {
          m.score1 = null; m.score2 = null; m.pens1 = null; m.pens2 = null;
          if (state.scoreOverrides) delete state.scoreOverrides[m.key || matchKey(m)];
          saveState(); renderAll(); toast('Cleared. The next feed sync may restore the official score.');
        }}, 'Clear'));
      }
      return wrap;
    })()
  );
  card.appendChild(entryRow);

  return card;
}

// ----- DRAFT TAB -----
function renderDraft() {
  const root = $('#tab-draft');
  root.innerHTML = '';

  // Loud warning when picks would stay on this device only — a family member
  // who opened the bare URL instead of the share link must not draft into a
  // disconnected local game.
  if (!cloudConfigured() && state.players && state.players.length > 0 && !state.draftComplete) {
    root.appendChild(el('div', { class: 'panel', style: 'border: 2px solid var(--accent-2); background: rgba(178,34,52,0.18);' },
      el('div', { style: 'font-weight: 800;' }, '⚠️ NOT CONNECTED TO THE FAMILY GAME'),
      el('div', { class: 'small', style: 'margin-top: 4px;' },
        'Picks made here stay on THIS device only. If you meant to join the family draft, open the share link you were sent, or connect with the game code in Settings.'),
      el('button', { style: 'margin-top: 8px;', onclick: () => switchTab('settings') }, 'Go to Settings →')
    ));
  }

  // Setup screen
  if (!state.players || state.players.length === 0) {
    const setup = el('div', { class: 'panel' },
      el('h2', {}, '🇺🇸 ROLL CALL — NAME THE PATRIOTS 🇺🇸'),
      el('div', { class: 'sub', style: 'border-left: 3px solid var(--accent); padding-left: 8px;' },
        'Joining the family game? DON\'T set up a new draft here — open the share link you were texted (or Settings → "Or join an existing game").'),
      el('div', { class: 'sub' }, 'Enter all four drafters below. The pick order rotates across groups using a BEAUTIFUL Latin square — each of you picks 1st, 2nd, 3rd, and 4th exactly 3 times across the 12 groups. PERFECTLY FAIR. Nobody does it better.'),
      el('div', { class: 'grid grid-2' },
        ['Patriot 1 (Red 🔴)', 'Patriot 2 (White ⚪)', 'Patriot 3 (Gold 🟡)', 'Patriot 4 (Blue 🔵)'].map((lbl, i) =>
          el('div', {},
            el('label', {}, lbl),
            el('input', { type: 'text', id: `p${i}-name`, placeholder: 'Name', value: ['Will', 'Dad', 'Barnes', 'Warner'][i] })
          )
        )
      ),
      el('div', { style: 'margin-top: 14px;' },
        el('button', { onclick: () => {
          const names = [0,1,2,3].map(i => document.getElementById(`p${i}-name`).value.trim());
          if (names.some(n => !n)) { toast('All four patriots must be named. No exceptions!', true); return; }
          state.players = names.map((n, i) => ({ name: n, color: PLAYER_COLORS[i] }));
          state.rosters = { 0: [], 1: [], 2: [], 3: [] };
          state.draftPickIdx = 0;
          state.spoilers = [];
          state.draftComplete = false;
          saveState();
          renderAll();
          toast('🇺🇸 Patriots locked in. LET THE DRAFT BEGIN! 🦅');
        }}, '🦅 START THE DRAFT →')
      )
    );
    root.appendChild(setup);
    return;
  }

  // Draft in progress
  if (!state.draftComplete) {
    const pick = currentPick();
    if (!pick || !state.players[pick.playerIdx]) {
      // Defensive: a half-synced state must never crash the whole render pass.
      root.appendChild(el('div', { class: 'panel' },
        el('h2', {}, '⏳ Syncing draft state…'),
        el('div', { class: 'sub' }, 'If this sticks around, tap Settings → 🔄 Sync now.')));
      return;
    }
    const player = state.players[pick.playerIdx];
    const groupTeams = teamsInGroup(pick.group);
    const remaining = groupTeams.filter(t => !draftedTeams().includes(t));
    const seats = deviceSeats();
    const mayPick = deviceMayPick(pick.playerIdx);

    // Seat claiming — which patriots pick from THIS device
    root.appendChild(el('div', { class: 'panel', style: 'padding: 10px 12px;' },
      el('div', { class: 'small', style: 'margin-bottom: 6px; font-weight: 700;' },
        '📱 Who picks from this device? ',
        el('span', { style: seats.length === 0 && cloudConfigured() ? 'font-weight: 700; color: #ffb3bd;' : 'font-weight: 400; color: var(--muted);' },
          seats.length === 0
            ? (cloudConfigured()
                ? '⚠️ UNCLAIMED — this device can pick for ANYONE on their turn. Tap your name(s) now so a stray tap can\'t draft for someone else.'
                : 'None claimed — anyone can pick here. Tap your name(s) to lock it down.')
            : 'Only their turns are pickable here.')),
      el('div', { class: 'row', style: 'display: flex; flex-wrap: wrap; gap: 6px;' },
        state.players.map((p, i) => {
          const claimed = seats.includes(i);
          return el('button', {

// Which side (1 or 2) won — i.e. ADVANCED from — a played match, or null if it
// is drawn with no shootout result recorded yet. Goals decide first, then pens.
function matchWinnerSide(m) {
  if (!hasResult(m)) return null;
  const s1 = Number(m.score1), s2 = Number(m.score2);
  if (s1 > s2) return 1;
  if (s2 > s1) return 2;
  if (m.pens1 != null && m.pens2 != null && Number(m.pens1) !== Number(m.pens2)) {
    return Number(m.pens1) > Number(m.pens2) ? 1 : 2;
  }
  return null; // drawn, no shootout recorded — undecided
}

function stillAlive(teamName) {
  // Can this team still earn more points (still in the tournament)?
  //
  // KNOCKOUT TRUTH (single elimination): the only ALWAYS-correct elimination
  // signal is "lost a knockout match you actually played." We never infer
  // elimination from unresolved future bracket placeholders ("W74", "1A") —
  // the feed resolves those names hours or days after the result lands, so
  // scanning them would flip advancing teams to "eliminated" during the gap.
  // The one twist: the two SEMI-FINAL LOSERS still play the 3rd-place match,
  // so losing the SF does NOT end a team's tournament.
  const norm = mapTeamName(teamName);
  const mine = state.matches.filter(m =>
    mapTeamName(m.team1) === norm || mapTeamName(m.team2) === norm);

  if (!mine.some(hasResult)) return true; // never played yet — still in

  const koPlayed = mine.filter(m => roundOf(m) !== 'group' && hasResult(m));
  for (const m of koPlayed) {
    const r = roundOf(m);
    if (r === 'final' || r === 'third') return false; // played the last match → done
    const winner = matchWinnerSide(m);
    if (winner === null) continue; // undecided (e.g. shootout pending) — not a loss
    const won = winner === (mapTeamName(m.team1) === norm ? 1 : 2);
    if (!won && r !== 'sf') return false; // lost R32/R16/QF → out (SF loser plays 3rd)
  }
  if (koPlayed.length) return true; // into the knockouts, not yet eliminated → alive

  // Only group games played. Don't eliminate on group math until the Round-of-32
  // bracket is FULLY resolved to real team names — until then a qualifier whose
  // slot is still a placeholder would be wrongly dropped (the group→KO gap).
  const r32 = state.matches.filter(m => roundOf(m) === 'r32');
  const bracketResolved = r32.length > 0 &&
    r32.every(m => TEAMS[mapTeamName(m.team1)] && TEAMS[mapTeamName(m.team2)]);
  if (!bracketResolved) return true;

  // R32 is fully drawn: a team that didn't qualify appears in no knockout match.
  return state.matches.some(m => roundOf(m) !== 'group' &&
    (mapTeamName(m.team1) === norm || mapTeamName(m.team2) === norm));
}

// ============================================================================
// 6b.  PROJECTION ENGINE
// ============================================================================
/**
 * calcProjection(playerIdx)
 * Returns {
 *   current,          — points already scored
 *   maxRemaining,     — max additional if all alive teams win all future matches
 *   projectedTotal,   — current + maxRemaining
 *   teamsAlive,       — count of still-alive teams
 *   teamsEliminated,  — count of eliminated teams
 *   teamsTotal,       — always 12
 *   aliveTeamDetails  — [{ teamName, flag, currentPoints, maxAdditional, nextMatch }]
 * }
 */
// Per-team projection: current points earned + the maximum a team can still add
// (remaining group wins + the reachable knockout Fibonacci ladder ×2,3,5,8,13 —
// each round a 6-pt KO win). A semi-final LOSER can only reach the 3rd-place
// match; everyone else still standing can climb to the Final. Rounds already
// played are skipped so nothing is double-counted. Shared by the player
// standings and the Title Race so the two always agree.
function teamCeiling(teamName) {
  const norm = mapTeamName(teamName);
  const current = teamPoints(teamName).total;
  const alive = stillAlive(teamName);
  let maxAdditional = 0, nextMatch = null;
  if (alive) {
    state.matches.filter(m => {
      if (hasResult(m)) return false;
      const t1 = mapTeamName(m.team1), t2 = mapTeamName(m.team2);
      return t1 === norm || t2 === norm;
    }).forEach(m => {
      const round = roundOf(m);
      // Max a remaining group game can yield: win (3) + GD bonus (+3, capped) = 6.
      // (A future KO match can't be known to be a civil war yet — the bracket is
      // unresolved — so we still project the full 6×mult there; a harmless, minor
      // over-projection that settles once the match becomes real.)
      if (round === 'group') maxAdditional += 6 * (ROUND_MULT[round] || 1);
      if (!nextMatch) {
        const opp = mapTeamName(m.team1) === norm ? mapTeamName(m.team2) : mapTeamName(m.team1);
        nextMatch = { date: m.date, opponent: opp, oppFlag: TEAMS[opp]?.flag || '⚽', round };
      }
    });
    const myKo = state.matches.filter(m => roundOf(m) !== 'group' && hasResult(m) &&
      (mapTeamName(m.team1) === norm || mapTeamName(m.team2) === norm));
    const lostSF = myKo.some(m => roundOf(m) === 'sf' &&
      matchWinnerSide(m) !== (mapTeamName(m.team1) === norm ? 1 : 2) && matchWinnerSide(m) !== null);
    const playedThird = state.matches.some(m => roundOf(m) === 'third' && hasResult(m) &&
      (mapTeamName(m.team1) === norm || mapTeamName(m.team2) === norm));
    let reachable;
    if (lostSF) reachable = playedThird ? [] : ['third'];
    else {
      const playedRounds = new Set(myKo.map(m => roundOf(m)));
      reachable = ['r32', 'r16', 'qf', 'sf', 'final'].filter(r => !playedRounds.has(r));
    }
    reachable.forEach(r => { maxAdditional += (3 + 3) * (ROUND_MULT[r] || 1); });
  }
  return { current, alive, maxAdditional, projectedMax: current + maxAdditional, nextMatch };
}

function calcProjection(playerIdx) {
  const roster = state.rosters[playerIdx] || [];
  let current = 0;
  let maxRemaining = 0;
  const aliveTeamDetails = [];

  roster.forEach(teamName => {
    const c = teamCeiling(teamName);
    current += c.current;
    if (c.alive) {
      maxRemaining += c.maxAdditional;
      aliveTeamDetails.push({
        teamName,
        flag: TEAMS[teamName]?.flag || '⚽',
        currentPoints: c.current,
        maxAdditional: c.maxAdditional,
        nextMatch: c.nextMatch,
      });
    }
  });

  const teamsAlive = roster.filter(t => stillAlive(t)).length;
  const teamsEliminated = roster.length - teamsAlive;

  return {
    current,
    maxRemaining,
    projectedTotal: current + maxRemaining,
    teamsAlive,
    teamsEliminated,
    teamsTotal: roster.length,
    aliveTeamDetails,
  };
}

// ----- SCHEDULE TAB -----
// ============================================================================
// 9b.  TOURNAMENT VIEWS (Groups · Bracket · Title Race · Dashboard)
// ============================================================================

// Live group-stage tables built from played group matches. 2026 format: the top 2
// of each of the 12 groups PLUS the 8 best 3rd-place teams advance to the Round of
// 32 (24 + 8 = 32). Returns { groups:{A:[row,...]}, letters:[...], thirds:[row,...] }.
// row = { team, flag, group, P,W,D,L,GF,GA,GD,Pts, rank, thirdRank?, bestThird?, qualifying }.
function computeGroupStandings() {
  const rows = {};
  Object.entries(TEAMS).forEach(([name, t]) => {
    if (!t.group) return;
    rows[name] = { team: name, flag: t.flag, group: t.group,
      P: 0, W: 0, D: 0, L: 0, GF: 0, GA: 0, GD: 0, Pts: 0 };
  });
  state.matches.forEach(m => {
    if (roundOf(m) !== 'group' || !hasResult(m)) return;
    const a = mapTeamName(m.team1), b = mapTeamName(m.team2);
    const ra = rows[a], rb = rows[b];
    if (!ra || !rb) return;
    const s1 = Number(m.score1), s2 = Number(m.score2);
    if (Number.isNaN(s1) || Number.isNaN(s2)) return;
    ra.P++; rb.P++; ra.GF += s1; ra.GA += s2; rb.GF += s2; rb.GA += s1;
    if (s1 > s2) { ra.W++; rb.L++; ra.Pts += 3; }
    else if (s2 > s1) { rb.W++; ra.L++; rb.Pts += 3; }
    else { ra.D++; rb.D++; ra.Pts++; rb.Pts++; }
  });
  Object.values(rows).forEach(r => { r.GD = r.GF - r.GA; });
  // FIFA-style sort: points, then goal difference, then goals for; alpha as the
  // final tiebreak (real FIFA adds head-to-head / fair-play / lots — overkill here).
  const cmp = (x, y) => y.Pts - x.Pts || y.GD - x.GD || y.GF - x.GF || x.team.localeCompare(y.team);
  const letters = [...new Set(Object.values(rows).map(r => r.group))].sort();
  const groups = {};
  letters.forEach(L => {
    const gr = Object.values(rows).filter(r => r.group === L).sort(cmp);
    gr.forEach((r, i) => { r.rank = i + 1; });
    groups[L] = gr;
  });
  const thirds = letters.map(L => groups[L][2]).filter(Boolean).sort(cmp);
  thirds.forEach((r, i) => { r.thirdRank = i + 1; r.bestThird = i < 8; });
  Object.values(rows).forEach(r => {
    r.qualifying = r.rank <= 2 || (r.rank === 3 && r.bestThird === true);
  });
  return { groups, letters, thirds };
}

  ));

  const body = el('div', { class: 'subview' });
  root.appendChild(body);
  if (_tournView === 'groups') renderGroupsView(body);
  else if (_tournView === 'bracket') renderBracketView(body);
  else if (_tournView === 'title') renderTitleView(body);
  else renderDashView(body);
}

    ));

// Humanize a knockout bracket placeholder ("W74", "1E", "3A/B/C/D/F", "L101")
// into a readable label. Returns null if the slot is already a real team.
function koSlotLabel(s) {
  if (!s) return '';
  if (TEAMS[mapTeamName(s)]) return null;
  let mm;
  if ((mm = s.match(/^W(\d+)$/))) return 'Winner M' + mm[1];
  if ((mm = s.match(/^L(\d+)$/))) return 'Loser M' + mm[1];
  if ((mm = s.match(/^1([A-L])$/))) return 'Winner Grp ' + mm[1];
  if ((mm = s.match(/^2([A-L])$/))) return 'Runner-up Grp ' + mm[1];
  if (/^3/.test(s)) return '3rd: ' + s.slice(1);
  return s;
}

function renderKoMatch(m) {
  const played = hasResult(m);
  const winner = matchWinnerSide(m); // 1 | 2 | null
  const card = el('div', { class: 'ko-match' });
  [1, 2].forEach(side => {
    const raw = side === 1 ? m.team1 : m.team2;
    const name = mapTeamName(raw);
    const isTeam = !!TEAMS[name];
    const owner = isTeam ? ownerOfTeam(name) : -1;
    const score = side === 1 ? m.score1 : m.score2;
    const pens = side === 1 ? m.pens1 : m.pens2;
    const cls = 'ko-team' + (played && winner === side ? ' ko-win' : (played && winner && winner !== side ? ' ko-lose' : ''));
    const row = el('div', { class: cls },
      el('span', { class: 'ko-flag' }, isTeam ? (TEAMS[name].flag || '⚽') : '⬚'),
      el('span', { class: 'ko-name' + (isTeam ? '' : ' ko-tbd') }, isTeam ? name : (koSlotLabel(raw) || raw))
    );
    if (owner >= 0) row.appendChild(el('span', { class: 'gt-owner', style: `background:${PLAYER_COLORS[owner]}` }));
    if (played) row.appendChild(el('span', { class: 'ko-score' }, String(score) + (pens != null ? ` (${pens})` : '')));
    card.appendChild(row);
  });
  card.appendChild(el('div', { class: 'ko-meta' }, (isCivilWar(m) ? '⚔️ Civil War · ' : '') + m.date + (m.ground ? ' · ' + m.ground : '')));
  return card;
}

function renderBracketView(root) {
  const ROUNDS = [['r32', 'Round of 32'], ['r16', 'Round of 16'], ['qf', 'Quarter-finals'],
                  ['sf', 'Semi-finals'], ['third', '3rd-Place Match'], ['final', 'Final']];
  root.appendChild(el('div', { class: 'panel' },
    el('h2', {}, '🏆 KNOCKOUT BRACKET'),

function renderTitleView(root) {
  const teams = Object.keys(TEAMS).map(name => {

  ));
  const table = el('div', { class: 'tr-table' });

function dashStat(big, label) {
  return el('div', { class: 'dash-stat' },
    el('div', { class: 'dash-stat-num' }, big), el('div', { class: 'dash-stat-lbl' }, label));
}

function renderDashView(root) {
  const played = state.matches.filter(m => hasResult(m) &&
    TEAMS[mapTeamName(m.team1)] && TEAMS[mapTeamName(m.team2)]);
  let goals = 0, biggest = null;
  played.forEach(m => {
    const s1 = Number(m.score1), s2 = Number(m.score2);
    goals += s1 + s2;
    const margin = Math.abs(s1 - s2);
    if (!biggest || margin > biggest.margin || (margin === biggest.margin && s1 + s2 > biggest.total)) {
      biggest = { margin, total: s1 + s2, s1, s2 };
    }
  });

  root.appendChild(el('div', { class: 'panel' },
    el('h2', {}, '📊 TOURNAMENT DASHBOARD'),
    el('div', { class: 'dash-stats' },
      dashStat(played.length + '/' + state.matches.length, 'matches played'),
      dashStat(String(goals), 'goals scored'),
      dashStat(played.length ? (goals / played.length).toFixed(2) : '0', 'goals / match'),
      dashStat(biggest ? `${biggest.s1}-${biggest.s2}` : '—', 'biggest result')
    )
  ));

  const topTeams = Object.keys(TEAMS).map(n => ({ n, pts: teamPoints(n).total, flag: TEAMS[n].flag, owner: ownerOfTeam(n) }))
    .filter(t => t.pts > 0).sort((a, b) => b.pts - a.pts).slice(0, 6);
  if (topTeams.length) {
    const tn = el('div', { class: 'panel' }, el('h2', {}, '🔥 Top Fantasy Nations'));
    topTeams.forEach((t, i) => tn.appendChild(el('div', { class: 'dash-row' },
      el('span', { class: 'dash-rank' }, '#' + (i + 1)),
      el('span', { class: 'gt-flag' }, t.flag || '⚽'),
      el('span', { class: 'gt-name' }, t.n),
      t.owner >= 0 ? el('span', { class: 'gt-owner', style: `background:${PLAYER_COLORS[t.owner]}` }) : null,
      el('span', { class: 'dash-val' }, t.pts + ' pts')
    )));
    root.appendChild(tn);
  }

  const upsets = played.map(m => {
    const w = matchWinnerSide(m); if (!w) return null;
    const t1 = mapTeamName(m.team1), t2 = mapTeamName(m.team2);
    const winT = w === 1 ? t1 : t2, loseT = w === 1 ? t2 : t1;
    const wp = impliedTitlePct(winT), lp = impliedTitlePct(loseT);
    if (!wp || !lp || wp >= lp) return null;
    return { winT, loseT, ratio: lp / wp, s1: Number(m.score1), s2: Number(m.score2), w };
  }).filter(Boolean).sort((a, b) => b.ratio - a.ratio).slice(0, 5);
  if (upsets.length) {
    const up = el('div', { class: 'panel' }, el('h2', {}, '😱 Biggest Upsets'));
    upsets.forEach(u => up.appendChild(el('div', { class: 'dash-row' },
      el('span', { class: 'gt-flag' }, TEAMS[u.winT]?.flag || '⚽'),
      el('span', { class: 'gt-name' }, `${u.winT} beat ${u.loseT}`),
      el('span', { class: 'dash-val' }, TITLE_ODDS[u.winT] || '')
    )));
    root.appendChild(up);
  }

  if (state.players && state.players.length) {
    const owners = state.players.map((p, i) => ({ name: p.name, pts: calcProjection(i).current, i }))
      .sort((a, b) => b.pts - a.pts);
    const ow = el('div', { class: 'panel' }, el('h2', {}, '🏅 Owner Standings'));
    owners.forEach((o, i) => ow.appendChild(el('div', { class: 'dash-row' },
      el('span', { class: 'dash-rank' }, '#' + (i + 1)),
      el('span', { class: 'gt-owner', style: `background:${PLAYER_COLORS[o.i]}` }),
      el('span', { class: 'gt-name' }, o.name),
      el('span', { class: 'dash-val' }, o.pts + ' pts')
    )));
    root.appendChild(ow);
  }
}

// ----- 🔮 CRYSTAL BALL CUP TAB — predict-the-winner side game -----------------
// Every family member taps a predicted winner for each match BEFORE kickoff; the
// Crystal Ball leaderboard tracks correct calls (round-weighted: group +1 … Final
// +13). Pure bragging rights — this never feeds the fantasy standings. Picks live
// in state.predictions and sync like bounties. Picks lock at kickoff.
function cbPickLabel(name) {
  return name === 'DRAW' ? '🤝 Draw' : `${TEAMS[name]?.flag || '⚽'} ${name}`;
}

function renderCbMatch(m) {
  const round = roundOf(m), weight = ROUND_MULT[round] || 1;
  const t1 = mapTeamName(m.team1), t2 = mapTeamName(m.team2);
  const players = state.players || [];
  const card = el('div', { class: 'match-card' });

  // Header: matchup + round weight + kickoff
  card.appendChild(el('div', { style: 'display:flex; align-items:center; justify-content:center; gap:10px; font-weight:800; font-size:15px;' },
    el('span', {}, `${TEAMS[t1]?.flag || '⚽'} ${t1}`),
    el('span', { class: 'small', style: 'opacity:0.6; font-weight:600;' }, 'vs'),
    el('span', {}, `${t2} ${TEAMS[t2]?.flag || '⚽'}`)));
  const koTime = centralTime(m.time);
  card.appendChild(el('div', { class: 'small', style: 'text-align:center; color:var(--muted);' },
    `${ROUND_NAME[round] || round} · 🔮 ×${weight} ${weight > 1 ? '(picks pay BIG)' : ''}${koTime ? ' · ' + koTime : ''}`));

  const out = matchOutcome(m);
  const decided = out != null && !(round !== 'group' && out === 'DRAW');
  const locked = pickLocked(m);

  if (decided) {
    card.appendChild(el('div', { class: 'match-outcome win', style: 'margin-top:6px;' },
      out === 'DRAW' ? '🤝 Drawn' : `✅ ${out} won`));
  } else if (locked) {
    card.appendChild(el('div', { class: 'small', style: 'text-align:center; margin-top:6px; color:var(--accent);' },
      '🔒 Picks locked' + (out === 'DRAW' ? ' — level, awaiting shootout' : '')));
  }

  // One row per player: their pick (editable when open + this device may pick).
  const rows = el('div', { style: 'margin-top:8px; display:flex; flex-direction:column; gap:6px;' });
  players.forEach((p, i) => {
    const pick = cbPickOf(m, i);
    const mayPick = !locked && deviceMayPick(i);
    const row = el('div', { style: 'display:flex; align-items:center; gap:8px; flex-wrap:wrap;' });
    row.appendChild(el('span', { class: 'dot', style: `background:${PLAYER_COLORS[i]}` }));
    row.appendChild(el('span', { style: 'min-width:74px; font-weight:700; font-size:13px;' }, p.name));

    if (decided || locked) {
      // Read-only: show the pick (and ✓/✗ + points once decided).
      if (pick == null) {
        row.appendChild(el('span', { class: 'small', style: 'color:var(--muted);' }, '— no pick'));
      } else {
        const hit = decided && pick === out;
        const tag = decided ? (hit ? ` ✓ +${weight}` : ' ✗') : '';
        row.appendChild(el('span', {
          class: 'pts-pill',
          style: decided
            ? `background:${hit ? PLAYER_COLORS[i] : 'rgba(255,255,255,0.08)'}; color:${hit ? '#1a1a1a' : 'var(--muted)'}; border:1px solid ${hit ? 'transparent' : 'var(--border)'};`
            : 'background:rgba(255,255,255,0.06); border:1px solid var(--border);'
        }, cbPickLabel(pick) + tag));
      }
    } else {
      // Open: pick buttons for each option, current pick highlighted.
      const opts = el('div', { class: 'row', style: 'gap:6px; flex:1;' });
      cbOptions(m).forEach(opt => {
        const chosen = pick === opt;
        opts.appendChild(el('button', {
          class: (chosen ? '' : 'ghost') + ' cb-opt',
          style: 'font-size:12px; padding:5px 9px;',
          onclick: () => {
            if (!mayPick) { toast(`Only ${p.name}'s device can set this pick (claim seats in Settings).`, true); return; }
            setCbPick(m, i, opt);
            renderCrystal();
            toast(`🔮 ${p.name} picks ${opt === 'DRAW' ? 'a draw' : opt}`);
          }
        }, cbPickLabel(opt) + (chosen ? ' ✓' : '')));
      });
      row.appendChild(opts);
    }
    rows.appendChild(row);
  });
  card.appendChild(rows);
  return card;
}

function renderCrystal() {
  const root = $('#tab-crystal');
  if (!root) return;
  root.innerHTML = '';

  if (!state.players || state.players.length === 0) {
    root.appendChild(el('div', { class: 'panel' },
      el('h2', {}, '🔮 THE CRYSTAL BALL CUP'),
      el('div', { class: 'sub' }, 'A side game for the whole family — predict each match winner before kickoff. Set up the draft first, then come back to gaze into the future.'),
      el('div', { class: 'row' }, el('button', { onclick: () => switchTab('draft') }, '⭐ Set Up Draft →'))));
    return;
  }

  // Intro + how it works
  root.appendChild(el('div', { class: 'panel' },
    el('h2', {}, '🔮 THE CRYSTAL BALL CUP'),
    el('div', { class: 'sub' },
      'Tap your predicted winner for every match BEFORE it kicks off. Right calls earn Crystal Ball points — and they pay by round, so nailing a Final is worth a TREMENDOUS 13×. This is pure bragging rights: it never changes the real fantasy scoreboard.')));

  // Leaderboard
  const board = cbBoard();
  const lead = el('div', { class: 'panel' }, el('h2', {}, '🏆 CRYSTAL BALL STANDINGS'));
  const anyPicks = board.some(b => b.made > 0);
  if (!anyPicks) {
    lead.appendChild(el('div', { class: 'sub' }, 'No picks scored yet — make your calls below and watch this board come alive.'));
  } else {
    board.forEach(b => {
      lead.appendChild(el('div', { style: 'display:flex; align-items:center; gap:10px; padding:7px 4px; border-bottom:1px solid var(--border);' },
        el('span', { style: 'width:22px; font-weight:800; color:var(--muted);' }, '#' + b.rank),
        el('span', { class: 'dot', style: `background:${PLAYER_COLORS[b.idx]}` }),
        el('span', { style: 'flex:1; font-weight:700;' }, b.name),
        el('span', { class: 'small', style: 'color:var(--muted);' }, `${b.correct}/${b.made} correct`),
        el('span', { class: 'pts', style: 'font-weight:800;' }, b.pts + ' pts')));
    });
  }
  root.appendChild(lead);

  // Seat hint
  const seats = deviceSeats();
  root.appendChild(el('div', { class: 'small', style: 'text-align:center; color:var(--muted); margin:2px 0 8px;' },
    seats.length
      ? `This device picks for: ${seats.map(i => state.players[i]?.name).filter(Boolean).join(', ')} (change in Settings).`
      : 'Open device — anyone can tap their own pick. Claim seats in Settings to lock each phone to its player.'));

  // Match lists: today's games, then upcoming, then recently decided.
  const today = localDateStr();
  const todays = state.matches.filter(m => m.date === today);
  const upcoming = state.matches.filter(m => m.date > today && !hasResult(m)).slice(0, 6);
  const decided = state.matches.filter(m => matchOutcome(m) != null).slice(-6).reverse();

  if (todays.length) {
    const panel = el('div', { class: 'panel' }, el('h2', {}, '🔮 TODAY — LOCK IN YOUR PICKS'));
    todays.forEach(m => panel.appendChild(renderCbMatch(m)));
    root.appendChild(panel);
  }
  if (upcoming.length) {
    const panel = el('div', { class: 'panel' }, el('h2', {}, '🗓️ COMING UP — CALL THEM EARLY'));
    upcoming.forEach(m => panel.appendChild(renderCbMatch(m)));
    root.appendChild(panel);
  }
  if (decided.length) {
    const panel = el('div', { class: 'panel' }, el('h2', {}, '📜 HOW YOUR CALLS LANDED'));
    decided.forEach(m => panel.appendChild(renderCbMatch(m)));
    root.appendChild(panel);
  }
  if (!todays.length && !upcoming.length && !decided.length) {
    root.appendChild(el('div', { class: 'panel' }, el('div', { class: 'sub' }, 'No matches to predict right now — check back on game day.')));
  }
}

// ----- RESULTS TAB — browse completed games by match day / group / nation -----
// Each view renders the SAME match cards as the Today tab (scores, owners, odds,
// and the upset/stunner outcome callouts), just grouped three different ways.
let _resultsView = 'matchday';
function setResultsView(v) { _resultsView = v; renderResults(); }

function _resultsHeader(title, sub) {
  return el('div', { class: 'panel', style: 'margin-bottom:4px;' },
    el('h2', {}, title), sub ? el('div', { class: 'sub' }, sub) : null);
}

function renderResults() {
  const root = $('#tab-results');
  if (!root) return;
  root.innerHTML = '';
  const views = [['matchday', '🗓️ Match Day'], ['group', '🅰️ Group'], ['nation', '🏳️ Nation']];
  const sub = el('div', { class: 'subnav' });
  views.forEach(([k, label]) => sub.appendChild(
    el('button', { class: 'subtab' + (_resultsView === k ? ' active' : ''), onclick: () => setResultsView(k) }, label)));
  root.appendChild(sub);

  const done = state.matches.filter(hasResult);
  if (!done.length) {
    root.appendChild(el('div', { class: 'panel' },
      el('h2', {}, '📋 RESULTS'),
      el('div', { class: 'sub' }, 'No results yet — once the first matches finish, relive every game (and every upset) here.')));
    return;
  }
  const body = el('div', {});
  root.appendChild(body);
  if (_resultsView === 'matchday') renderResultsByMatchday(body, done);
  else if (_resultsView === 'group') renderResultsByGroup(body, done);
  else renderResultsByNation(body, done);
}

function renderResultsByMatchday(root, done) {
  root.appendChild(_resultsHeader('🗓️ RESULTS BY MATCH DAY', `${done.length} match${done.length > 1 ? 'es' : ''} in the books.`));
  const groups = {};
  done.forEach(m => { const k = m.round || ROUND_NAME[roundOf(m)]; (groups[k] = groups[k] || []).push(m); });
  const minDate = arr => arr.map(x => x.date).sort()[0];
  Object.keys(groups)
    .sort((a, b) => minDate(groups[a]).localeCompare(minDate(groups[b])))
    .forEach(k => {
      const ms = groups[k].slice().sort((a, b) => a.date.localeCompare(b.date) || String(a.time).localeCompare(String(b.time)));
      const sec = el('div', { class: 'panel' }, el('h2', { style: 'font-size:15px;' }, `${k} · ${ms[0].date}`));
      ms.forEach(m => sec.appendChild(renderMatchCard(m, true, true)));
      root.appendChild(sec);
    });
}

function renderResultsByGroup(root, done) {
  root.appendChild(_resultsHeader('🅰️ RESULTS BY GROUP', 'Group-stage results by group, plus the knockout bracket.'));
  const letters = [...new Set(Object.values(TEAMS).map(t => t.group))].sort();
  letters.forEach(L => {
    const ms = done.filter(m => roundOf(m) === 'group' && (m.group === L || TEAMS[mapTeamName(m.team1)]?.group === L))
      .sort((a, b) => a.date.localeCompare(b.date) || String(a.time).localeCompare(String(b.time)));
    if (!ms.length) return;
    const sec = el('div', { class: 'panel' }, el('h2', { style: 'font-size:15px;' }, 'GROUP ' + L));
    ms.forEach(m => sec.appendChild(renderMatchCard(m, true, true)));
    root.appendChild(sec);
  });
  const ko = done.filter(m => roundOf(m) !== 'group').sort((a, b) => (a.num || 0) - (b.num || 0));
  if (ko.length) {
    const sec = el('div', { class: 'panel' }, el('h2', { style: 'font-size:15px;' }, '⚡ KNOCKOUT STAGE'));
    ko.forEach(m => sec.appendChild(renderMatchCard(m, true, true)));
    root.appendChild(sec);
  }
}

function renderResultsByNation(root, done) {
  root.appendChild(_resultsHeader('🏳️ RESULTS BY NATION', 'Every nation’s results — favorites first.'));
  Object.keys(TEAMS)
    .map(n => ({ n, pct: impliedTitlePct(n), ms: done.filter(m => mapTeamName(m.team1) === n || mapTeamName(m.team2) === n) }))
    .filter(x => x.ms.length)
    .sort((a, b) => (b.pct || 0) - (a.pct || 0) || a.n.localeCompare(b.n))
    .forEach(({ n, ms }) => {
      const owner = ownerOfTeam(n);
      const sec = el('div', { class: 'panel' });
      sec.appendChild(el('div', { style: 'display:flex; align-items:center; gap:8px; margin-bottom:4px;' },
        el('span', { style: 'font-size:20px;' }, TEAMS[n].flag || '⚽'),
        el('h2', { style: 'font-size:15px; margin:0;' }, n),
        owner >= 0 ? el('span', { class: 'gt-owner', style: `background:${PLAYER_COLORS[owner]}` }) : null,
        owner >= 0 ? el('span', { class: 'small', style: 'color:var(--muted);' }, state.players[owner]?.name || '') : null));
      ms.slice().sort((a, b) => a.date.localeCompare(b.date) || (a.num || 0) - (b.num || 0))
        .forEach(m => sec.appendChild(renderMatchCard(m, true, true)));
      root.appendChild(sec);
    });
}

function renderSchedule() {
  const root = $('#tab-schedule');
  root.innerHTML = '';
  root.appendChild(el('div', { class: 'panel' },
    el('h2', {}, '📅 THE FULL SCHEDULE — EVERY MATCH'),
    el('div', { class: 'row', style: 'margin-bottom: 10px;' },
      el('button', { onclick: syncScores }, '🔄 SYNC SCORES'),
      el('span', { class: 'small' }, state.lastSync ? `Last sync: ${new Date(state.lastSync).toLocaleString()}` : 'Not yet synced'),
      el('span', { class: 'spacer' }),
      el('label', { style: 'margin: 0;' }, 'Filter: '),
      (() => {
        const sel = el('select', { id: 'sched-filter', onchange: () => renderSchedule(), style: 'background: var(--panel-2); color: var(--text); border: 1px solid var(--border); padding: 8px; border-radius: 6px;' },
          el('option', { value: 'all' }, 'All matches'),
          el('option', { value: 'upcoming' }, 'Upcoming'),
          el('option', { value: 'played' }, 'Played'),
          el('option', { value: 'group' }, 'Group stage'),
          el('option', { value: 'ko' }, 'Knockouts'),
        );
        // remember
        if (window._schedFilter) sel.value = window._schedFilter;
        sel.addEventListener('change', () => window._schedFilter = sel.value);
        return sel;
      })()
    )
  ));

  const filter = window._schedFilter || 'all';
  const filtered = state.matches.filter(m => {
    if (filter === 'upcoming') return !hasResult(m);
    if (filter === 'played') return hasResult(m);
    if (filter === 'group') return roundOf(m) === 'group';
    if (filter === 'ko') return roundOf(m) !== 'group';
    return true;
  });

  // Group by date
  const byDate = {};
  filtered.forEach(m => {
    if (!byDate[m.date]) byDate[m.date] = [];
    byDate[m.date].push(m);
  });
  Object.keys(byDate).sort().forEach(date => {
    const panel = el('div', { class: 'panel' },
      el('h2', {}, date),
    );
    byDate[date].forEach(m => panel.appendChild(renderMatchCard(m, true, true)));
    root.appendChild(panel);
  });
}

// ----- ROSTERS TAB -----

  state.players.forEach((p, i) => {
    // Big dogs first: sorted by locked title chance, alphabetical on ties
    const teams = (state.rosters[i] || []).slice().sort((a, b) =>
      (impliedTitlePct(b) ?? 0) - (impliedTitlePct(a) ?? 0) || a.localeCompare(b));

      el('div', { class: 'roster-grid' },
        state.spoilers.slice().sort((a, b) =>
          (impliedTitlePct(b) ?? 0) - (impliedTitlePct(a) ?? 0) || a.localeCompare(b)
        ).map(t => el('div', { class: 'roster-team', style: 'border-style: dashed;' },
          el('span', {},
            el('span', { style: 'margin-right:8px; font-size: 18px;' }, TEAMS[t].flag),
            t,
            el('span', { class: 'small', style: 'margin-left:6px;' }, `(${TEAMS[t].group})`),
            TITLE_ODDS[t] ? el('span', { class: 'small', style: 'margin-left:8px; color: var(--accent); font-weight: 700; white-space: nowrap;',
              title: `Draft-night odds to win the World Cup (locked) — about a ${oneInN(t)} shot` }, `🏆 ${TITLE_ODDS[t]} · ${titlePctLabel(t)}`) : null
          ),
          el('span', { class: 'small' }, 'No owner')

// ----- SETTINGS TAB -----
function renderSettings() {
  const root = $('#tab-settings');
  root.innerHTML = '';
  root.appendChild(el('div', { class: 'panel' },
    el('h2', {}, '📖 THE SCORING RULEBOOK — PURE PATRIOTISM 🇺🇸'),
    el('div', { class: 'sub' }, 'Simple, clean, wins-based. The match result is all that matters — no goal bonuses, no clean-sheet bonuses. Win the game, win the points. Knockouts multiply BIGLY so comebacks are always alive.'),
    el('div', { class: 'legend' },
      el('div', { class: 'legend-item' }, el('strong', {}, '🏆 Win'), '3 pts — WINNING'),
      el('div', { class: 'legend-item' }, el('strong', {}, '🤝 Draw'), '1 pt each — solid effort'),
      el('div', { class: 'legend-item' }, el('strong', {}, '❌ Loss'), '0 pts — try again'),
      el('div', { class: 'legend-item' }, el('strong', {}, '🚀 Advanced (KO only)'), '+3 — MOVING ON UP'),
    ),
    el('div', { style: 'margin-top: 16px; padding: 14px; background: var(--panel-2); border-radius: 8px; border-left: 4px solid var(--accent);' },
      el('strong', { style: 'color: var(--accent);' }, '⚡ THE FIBONACCI LADDER (multiplies the points above): '),
      el('span', { style: 'font-weight: 700;' }, 'Group ×1 → R32 ×2 → R16 ×3 → QF ×5 → SF ×8 → 3rd-place ×5 → 🏆 FINAL ×13 🏆')),
    el('div', { style: 'margin-top: 12px;' },
      el('strong', { style: 'color: var(--accent);' }, 'Example: '),
      el('span', {}, 'A group-stage win = 3 pts. The same win in the Final = (3+3) × 13 = 78 pts. Going far is HUGE.')),
  ));

  root.appendChild(el('div', { class: 'panel' },
    el('h2', {}, '🔄 LIVE SCORE FEED'),
    el('div', { class: 'sub' }, 'Pulls scores from the openfootball data feed automatically. If the feed is slow or stale, you can always punch in scores manually in the Schedule tab — never give up control!'),
    el('div', { class: 'row' },
      el('button', { onclick: syncScores }, '🔄 Sync now'),
      el('span', { class: 'small' }, state.lastSync ? `Last sync: ${new Date(state.lastSync).toLocaleString()}` : 'Never synced'),
    ),
    el('div', { class: 'small', style: 'margin-top: 8px;' },
      'Source: ', el('a', { href: 'https://github.com/openfootball/worldcup.json', target: '_blank', style: 'color: var(--accent);' }, 'openfootball/worldcup.json')),
  ));

  // Cloud sync panel
  const cloudPanel = el('div', { class: 'panel' },
    el('h2', {}, '🌐 FAMILY CLOUD SYNC — ALL DEVICES, ONE BIG WIN'),
    el('div', { class: 'sub' }, '🇺🇸 Share one game across every phone in the family — instantly. Free, no signup, totally seamless. Picks push the moment they happen and every device refreshes every few seconds during the draft (every 45s after). NOBODY does it better. 🇺🇸'),
  );
  if (!cloudConfigured()) {
    cloudPanel.appendChild(el('div', { class: 'row' },
      el('button', { onclick: createCloudGame }, '🆕 LAUNCH CLOUD GAME'),
    ));
    cloudPanel.appendChild(el('details', { style: 'margin-top: 12px;' },
      el('summary', {}, 'Or join an existing game'),
      el('div', { style: 'margin-top: 10px;' },
        el('label', {}, 'Game code or share link'),
        el('input', { type: 'text', id: 'join-code-input', placeholder: 'Paste the share link or code here…' }),
        el('div', { style: 'margin-top: 8px;' },
          el('button', { onclick: () => joinCloudGame(document.getElementById('join-code-input').value) }, 'Join'),
        ),
      ),
    ));
  } else {
    const link = shareableLink();
    cloudPanel.appendChild(el('div', { id: 'cloud-status-text', style: 'color: var(--green); font-weight: 700; margin-bottom: 6px;' },
      (() => {
        const ts = state.cloudLastPushed || state.cloudLastPulled;
        return ts ? `✓ Connected · last sync ${new Date(ts).toLocaleTimeString()}` : '✓ Connected';
      })()
    ));
    cloudPanel.appendChild(el('div', { class: 'small', style: 'margin-bottom: 10px;' }, `Game ID: ${state.cloudGameId}`));
    cloudPanel.appendChild(el('div', { class: 'row' },

        try { await navigator.clipboard.writeText(link); toast('Share link copied!'); }
        catch (e) { toast('Copy failed — long-press the link below to copy.', true); }
      }}, '📋 Copy share link'),
      // Two-way sync: push any local changes up, then pull the latest down.
      el('button', { class: 'ghost', onclick: async () => {
        toast('Syncing…');
        await pushToCloud();
        await pullFromCloud({ force: true });
        toast('Synced.');
      }}, '🔄 Sync now'),
      // Deliberate upload: force THIS board into the cloud. The safety net if a
      // device ever shows the right board but others are missing picks.
      el('button', { onclick: forcePushToCloud }, '⬆️ Push my board'),
      el('button', { class: 'danger', onclick: () => {
        if (confirm('Disconnect from cloud? Your local data stays intact.')) disconnectCloud();
      }}, '🔌 Disconnect'),
    ));
    cloudPanel.appendChild(el('div', { class: 'small', style: 'margin-top: 6px; color: var(--muted);' },
      '“Push my board” uploads what THIS device shows to everyone. Use it if a phone is missing picks you can see here.'));
    cloudPanel.appendChild(el('div', { class: 'small', style: 'margin-top: 10px; word-break: break-all; padding: 8px; background: var(--panel-2); border-radius: 6px; border: 1px solid var(--border);' },
      el('span', {}, 'Share this link with your family: '),
      el('br'),
      el('a', { href: link, style: 'color: var(--accent);' }, link)
    ));
  }
  root.appendChild(cloudPanel);

  root.appendChild(el('div', { class: 'panel' },
    el('h2', {}, '💾 BACKUP & RESTORE — DEFEND YOUR DATA'),
    el('div', { class: 'sub' }, 'Export the whole game (rosters, scores, picks) to a file you control. Re-import any time. Always keep your data SAFE — that\'s the American way.'),
    el('div', { class: 'row' },
      el('button', { onclick: exportState }, '⬇️ Export'),
      el('button', { class: 'ghost', onclick: () => document.getElementById('import-file').click() }, '⬆️ Import'),
      el('input', { type: 'file', id: 'import-file', accept: '.json', style: 'display:none;', onchange: importState }),
      el('button', { class: 'danger', onclick: resetAll }, '🗑 Reset everything'),
    )
  ));
  // Keep the freshly rendered status line consistent with the staleness check
  updateCloudStatusLine();

function exportState() {
  const blob = new Blob([JSON.stringify(state, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `wc2026-family-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
  URL.revokeObjectURL(url);
}

function importState(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const imported = JSON.parse(ev.target.result);
      // Accept both formats: an app export (bare state) and a raw cloud-blob
      // backup ({v, savedAt, state}) — importing the wrong one used to
      // produce a broken state that then auto-pushed family-wide.
      const candidate = (imported && imported.state && imported.savedAt) ? imported.state : imported;
      if (!candidate || typeof candidate !== 'object' || !Array.isArray(candidate.players)) {
        toast('That file doesn\'t look like a game backup — nothing was changed.', true);
        return;
      }
      if (cloudConfigured() &&
          !confirm('Importing replaces this device\'s game AND syncs the imported data to the whole family. Continue?')) return;
      // Preserve device-local data across the restore: the cloud connection
      // (a raw cloud-blob backup has no cloudGameId — stripCloudKeys removed
      // it — and an export from another device may carry a different id) and
      // the schedule/feed cache (cloud blobs carry no matches at all).
      const keepId = state.cloudGameId, keepMatches = state.matches,
            keepLastSync = state.lastSync, keepSchedVer = state.scheduleVersion;
      state = { ...JSON.parse(JSON.stringify(DEFAULT_STATE)), ...candidate };
      // A connected device keeps ITS game (no silent switching); a fresh
      // device may adopt the id carried by an app export.
      state.cloudGameId = keepId || state.cloudGameId || null;
      if (!state.matches || state.matches.length === 0) {
        state.matches = keepMatches;
        state.lastSync = keepLastSync;
      }
      state.scheduleVersion = keepSchedVer;
      applyScoreOverrides();
      saveState();
      if (cloudConfigured() && !_cloudPullTimer) startCloudPolling();
      renderAll();
      toast(cloudConfigured() ? 'Imported — syncing the restored game to the family.' : 'Imported successfully.');
    } catch (err) {
      toast('Import failed: ' + err.message, true);
    }
  };
  reader.readAsText(file);
}

function resetAll() {
  // Resets THIS DEVICE ONLY and never pushes to the cloud — a reset must not
  // be able to nuke the family game. Rejoining the share link restores everything.
  if (!confirm('Reset EVERYTHING on this device (players, rosters, scores)? This cannot be undone.')) return;
  if (cloudConfigured() &&
      !confirm('This device is connected to the family cloud game. Resetting disconnects THIS device only — the family game stays safe in the cloud. Continue?')) return;
  stopCloudPolling();
  if (_pushRetryTimer) { clearTimeout(_pushRetryTimer); _pushRetryTimer = null; }
  _pushFailed = false;
  try { localStorage.removeItem(STATE_KEY); } catch (e) { console.warn('localStorage remove failed', e); }
  state = JSON.parse(JSON.stringify(DEFAULT_STATE));
  state.matches = SCHEDULE_2026.map(m => ({ ...m, key: matchKey(m), score1: null, score2: null, pens1: null, pens2: null }));
  state.scheduleVersion = SCHEDULE_VERSION;
  saveState({ skipCloudPush: true });
  renderAll();
  toast('Reset complete (this device only). Rejoin the family game any time with the share link.');
}

// ============================================================================
// 10.  BOOT
// ============================================================================
renderAll();

// 10a. URL ?game=<id> auto-join. Pasting/clicking a share link should drop the
// user straight into the family's shared game.
let _urlJoinPending = false;
(function handleUrlParams() {
  const params = new URLSearchParams(window.location.search);
  const urlGame = params.get('game');
  if (!urlGame) return;
  if (state.cloudGameId === urlGame) {
    // Already joined this game — just refresh from cloud
    startCloudPolling();
    setTimeout(() => pullFromCloud({ force: true, quiet: true }), 200);
  } else {
    // New game from a share link. Block 10b's pull of the OLD game until the
    // join finishes — otherwise old-game state could land under the new id.
    _urlJoinPending = true;
    setTimeout(() => { joinCloudGame(urlGame).finally(() => { _urlJoinPending = false; }); }, 200);
  }
})();

// 10b. If already connected to a cloud game from a previous visit, resume polling
if (cloudConfigured() && !_cloudPullTimer && !_urlJoinPending) {
  startCloudPolling();
  // If a pick never reached the cloud before the last reload, land it FIRST —
  // the dirty flag survives in localStorage and the read-before-write probe
  // in _doPushToCloud keeps the catch-up push from clobbering newer state.
  let bootDirty = false;
  try { bootDirty = !!localStorage.getItem(DIRTY_KEY); } catch (e) {}
  if (bootDirty) { _pushFailed = true; pushToCloud(); }
  // Pull once on load so the latest cloud state wins over any stale local.
  // Forced: a skewed device clock must never make this device boot stale.
  setTimeout(() => pullFromCloud({ force: true, quiet: true }), 400);
}

// 10c. Pull from cloud whenever the tab regains focus (catches mobile resumes).
// Forced + quiet: a just-woken phone adopts the latest cloud state regardless
// of timestamp comparisons. (If a local push is still pending, pullFromCloud
// pushes that first instead — unsynced picks are never discarded. Never mid-pick.)
window.addEventListener('focus', () => { if (cloudConfigured() && !_pickBusy) pullFromCloud({ force: true, quiet: true }); });
document.addEventListener('visibilitychange', () => {
  if (document.visibilityState === 'visible' && cloudConfigured() && !_pickBusy) pullFromCloud({ force: true, quiet: true });
});

// 10c2. When the network comes back, land any state that never reached the cloud
window.addEventListener('online', () => { if (cloudConfigured() && _pushFailed) pushToCloud(); });

// 10c3. Match-preview manifest (briefing pages + podcast episodes per match),
// regenerated overnight by the previews cron. Re-render only when it changes.
async function loadMatchPreviews() {
  try {
    const r = await fetch('matchday/index.json', { cache: 'no-store' });
    if (!r.ok) return;
    const raw = await r.text();
    if (raw === _matchPreviewsRaw) return;
    const j = JSON.parse(raw);
    if (j && typeof j === 'object' && !Array.isArray(j)) {
      _matchPreviews = j;
      _matchPreviewsRaw = raw;
      renderAll();
    }
  } catch (e) { /* no previews yet — links simply don't render */ }
}
async function loadNewsArchive() {
  try {
    const r = await fetch('briefings/index.json', { cache: 'no-store' });
    if (!r.ok) return;
    const raw = await r.text();
    if (raw === _newsArchiveRaw) return;
    const j = JSON.parse(raw);
    if (Array.isArray(j)) {
      _newsArchive = j;
      _newsArchiveRaw = raw;
      renderAll();
    }
  } catch (e) { /* no archive yet */ }
}
loadMatchPreviews();
loadNewsArchive();
setInterval(() => { loadMatchPreviews(); loadNewsArchive(); }, 6 * 3600e3);

// 10d. Auto-sync match results from openfootball once the tournament starts
// (local date — UTC would arm this mid-draft on the evening of June 10),
// then keep scores fresh while the app sits open on game days.
if (state.players && state.players.length > 0) {
  if (localDateStr() >= '2026-06-11') {
    syncFromFeed({ quiet: true });
    setInterval(() => {
      if (!document.hidden && state.players && state.players.length > 0) syncFromFeed({ quiet: true });
    }, 10 * 60 * 1000);
  }
}
