name: MWCGA Civil War Announcer

# When the knockout bracket resolves a match between two teams owned by the SAME
# player (a "Civil War Bounty"), email the family telling that owner to make
# their pick. Fires ONCE per matchup — announced match keys are committed to
# .mwcga-civilwar.json so a matchup is never re-emailed. A no-op (no email, no
# commit) on every run where nothing new has resolved.

on:
  schedule:
    - cron: '15 */2 * * *'   # every 2 hours — catches a fresh bracket draw within ~2h
  workflow_dispatch:         # run manually anytime

permissions:
  contents: write        # commit the announced-matchups file on a bot branch
  pull-requests: write   # open the auto-merging content PR

concurrency:
  group: mwcga-watch-civilwar
  cancel-in-progress: false

jobs:
  announce:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # PAT so the content PR is opened by a real user → triggers the `gates` CI.
          token: ${{ secrets.CONTENT_PAT || github.token }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Announce new Civil War matchups
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MWCGA_RECIPIENTS: ${{ secrets.MWCGA_RECIPIENTS }}
        run: |
          npm install --no-fund --no-audit nodemailer@7
          node scripts/watch-civilwar.mjs

      - name: Save announced matchups (auto-merge PR)
        env:
          GH_TOKEN: ${{ secrets.CONTENT_PAT }}
        run: |
          set -e
          if [ -z "$(git status --porcelain .mwcga-civilwar.json)" ]; then
            echo "No new matchups to record."; exit 0
          fi
          MSG="civil-war: record announced matchup(s)"
          git config user.name "mwcga-radio"
          git config user.email "actions@users.noreply.github.com"
          BRANCH="bot/civilwar-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git checkout -b "$BRANCH"
          git add .mwcga-civilwar.json
          git commit -m "$MSG"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" --title "$MSG" \
            --body "Automated state update. Auto-merges once \`gates\` passes." || true
          gh pr merge "$BRANCH" --auto --squash --delete-branch || echo "auto-merge enable failed (non-fatal)"
