name: MWCGA Match Previews

on:
  schedule:
    - cron: '0 7 * * *'   # 2:00 AM Central — overnight previews for today's slate
  workflow_dispatch:
    inputs:
      fake_today:
        description: 'Override date for testing (YYYY-MM-DD), blank = real today'
        required: false
        default: ''

permissions:
  contents: write        # commit content on a bot branch
  pull-requests: write   # open the auto-merging content PR

jobs:
  previews:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # PAT so the content PR is opened by a real user → triggers the `gates` CI.
          # (PRs opened by the default GITHUB_TOKEN deliberately do NOT trigger
          # workflows, so auto-merge would hang waiting for a check that never runs.)
          token: ${{ secrets.CONTENT_PAT || github.token }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Generate match previews
        id: gen
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          MWCGA_FAKE_TODAY: ${{ inputs.fake_today }}
        run: node scripts/match-previews.mjs

      - name: Publish (auto-merge PR)
        if: steps.gen.outputs.count != '0'
        env:
          GH_TOKEN: ${{ secrets.CONTENT_PAT }}
        run: |
          set -e
          MSG="previews: $(date -u +%F) slate (${{ steps.gen.outputs.count }} new)"
          git config user.name "mwcga-radio"
          git config user.email "actions@users.noreply.github.com"
          git add matchday podcasts/matches match-previews.xml 2>/dev/null || true
          if git diff --cached --quiet; then echo "Nothing to publish."; exit 0; fi
          BRANCH="bot/previews-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git checkout -b "$BRANCH"
          git commit -m "$MSG"
          git push -u origin "$BRANCH"
          # Open the content PR and let it auto-merge once `gates` is green. Content
          # never touches code, so gates passes; main stays gated for real code PRs.
          gh pr create --base main --head "$BRANCH" --title "$MSG" \
            --body "Automated content publish. Auto-merges once \`gates\` passes." || true
          gh pr merge "$BRANCH" --auto --squash --delete-branch || echo "auto-merge enable failed (non-fatal)"
