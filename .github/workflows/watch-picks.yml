name: MWCGA Draft Tripwire

# Daily safety check: reads the cloud game and emails an alert if the pick count
# ever DROPS below the highest we've recorded (sign of a stale device wiping the
# draft). Records the high-water mark in .mwcga-pickwatch.json so it only fires
# on a real regression, not on every healthy run.

on:
  schedule:
    - cron: '30 13 * * *'   # 08:30 Central — once a day, after the morning sweep
  workflow_dispatch:        # run manually anytime

permissions:
  contents: write        # commit the high-water-mark file on a bot branch
  pull-requests: write   # open the auto-merging content PR

concurrency:
  group: mwcga-watch-picks
  cancel-in-progress: false

jobs:
  watch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          # PAT so the content PR is opened by a real user → triggers the `gates` CI.
          token: ${{ secrets.CONTENT_PAT || github.token }}

      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Check cloud pick count
        env:
          MAIL_USERNAME: ${{ secrets.MAIL_USERNAME }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          MWCGA_RECIPIENTS: ${{ secrets.MWCGA_RECIPIENTS }}
        run: |
          npm install --no-fund --no-audit nodemailer@7
          node scripts/watch-picks.mjs

      - name: Save high-water mark (auto-merge PR)
        env:
          GH_TOKEN: ${{ secrets.CONTENT_PAT }}
        run: |
          set -e
          if [ -z "$(git status --porcelain .mwcga-pickwatch.json)" ]; then
            echo "No change to high-water mark."; exit 0
          fi
          MSG="tripwire: update pick high-water mark"
          git config user.name "mwcga-radio"
          git config user.email "actions@users.noreply.github.com"
          BRANCH="bot/pickwatch-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          git checkout -b "$BRANCH"
          git add .mwcga-pickwatch.json
          git commit -m "$MSG"
          git push -u origin "$BRANCH"
          gh pr create --base main --head "$BRANCH" --title "$MSG" \
            --body "Automated state update. Auto-merges once \`gates\` passes." || true
          gh pr merge "$BRANCH" --auto --squash --delete-branch || echo "auto-merge enable failed (non-fatal)"
